mcqs:
- id: mcq_bio_ch1_001
  question: Which plane divides the human body into left and right halves?
  options:
  - Sagittal Plane
  - Frontal Plane
  - Transverse Plane
  - Oblique Plane
  answer: Sagittal Plane
  explanation: The sagittal plane runs anteroposteriorly, dividing the body into left
    and right halves. Flexion and extension occur within this plane.
- id: mcq_bio_ch1_002
  question: Rotation in the transverse plane occurs around which axis of motion?
  options:
  - Anteroposterior Axis
  - Mediolateral Axis
  - Vertical (Longitudinal) Axis
  - Frontal Axis
  answer: Vertical (Longitudinal) Axis
  explanation: Movement in the transverse (horizontal) plane occurs around a vertical
    or longitudinal axis of motion (e.g., spinal rotation or hip internal/external
    rotation).
- id: mcq_bio_ch1_003
  question: The glenohumeral joint is classified as having how many degrees of freedom?
  options:
  - One
  - Two
  - Three
  - Four
  answer: Three
  explanation: The glenohumeral joint is a ball-and-socket joint that permits motion
    in all three cardinal planes (flexion/extension, abduction/adduction, internal/external
    rotation), giving it three degrees of freedom.
- id: mcq_bio_ch1_004
  question: According to the concave-convex rule, when the convex femoral head moves
    on the stable concave acetabulum during hip abduction, what is the relation of
    roll and slide?
  options:
  - Roll and slide occur in the same direction
  - Roll occurs without slide
  - Roll and slide occur in opposite directions
  - Slide occurs without roll
  answer: Roll and slide occur in opposite directions
  explanation: Since the moving femoral head is a convex surface moving on a stable
    concave acetabular cup, the arthrokinematic roll and slide occur in opposite directions
    (roll occurs superiorly, slide occurs inferiorly).
- id: mcq_bio_ch1_005
  question: Which of the following joint actions is a classic example of a closed
    kinematic chain (CKC) movement?
  options:
  - Seated leg extension on a machine
  - A standing bodyweight squat
  - A biceps curl with a dumbbell
  - An active leg swing in side-lying
  answer: A standing bodyweight squat
  explanation: In a squat, the feet are fixed to the ground (distal segment fixed),
    making it a closed kinematic chain movement that requires synchronized motion
    at the ankle, knee, and hip joints.
- id: mcq_bio_ch1_006
  question: 'An abnormal end feel characterized by a bouncy, springy rebound before
    full range of motion is achieved is highly suggestive of:'
  options:
  - Severe joint infection
  - Osteophyte bone-to-bone block
  - A displaced intra-articular structure, such as a meniscus tear
  - An empty end feel
  answer: A displaced intra-articular structure, such as a meniscus tear
  explanation: A springy block end feel is pathological and is caused by a mechanical
    block, typically a displaced piece of cartilage or meniscus, rebounding within
    the joint.
- id: mcq_bio_ch1_007
  question: Which goniometric landmark is typically used as the fulcrum for measuring
    knee flexion?
  options:
  - Greater trochanter of the femur
  - Lateral epicondyle of the femur
  - Lateral malleolus of the fibula
  - Patella apex
  answer: Lateral epicondyle of the femur
  explanation: To measure knee flexion and extension, the goniometer fulcrum is placed
    over the lateral epicondyle of the femur, with the arms aligned with the greater
    trochanter and lateral malleolus.
- id: mcq_bio_ch1_008
  question: 'If a joint has an ''empty'' end feel, the clinician must:'
  options:
  - Apply vigorous passive stretching to break adhesions
  - Apply grade IV manual joint oscillations
  - Stop the movement immediately and refer for medical evaluation
  - Use local heat to relax the muscular resistance
  answer: Stop the movement immediately and refer for medical evaluation
  explanation: An empty end feel is a clinical red flag representing a severe acute
    inflammatory or structural lesion where pain prevents reaching end-range tissue
    resistance; further force is contraindicated.
- id: mcq_bio_ch1_009
  question: 'An arthrokinematic motion where multiple points on one surface contact
    multiple points on another surface is defined as:'
  options:
  - Spin
  - Slide
  - Roll
  - Shear
  answer: Roll
  explanation: Roll is defined as the contact of multiple points on one articulating
    surface with multiple points on the opposing surface, similar to a wheel rolling
    on flat ground.
- id: mcq_bio_ch1_010
  question: Which joint in the human body is classified as a uniaxial hinge joint?
  options:
  - Humeroulnar joint
  - Radiocarpal joint
  - Subtalar joint
  - Coxofemoral joint
  answer: Humeroulnar joint
  explanation: The humeroulnar joint of the elbow is a uniaxial hinge joint that permits
    only flexion and extension within the sagittal plane around a mediolateral axis.
viva:
- id: viva_${chapterId}_${index+1}
  question: State the Concave-Convex Rule and explain its clinical significance in
    manual joint mobilization.
  answer: The rule states that if a convex surface moves on a stable concave surface,
    roll and slide occur in opposite directions; if a concave surface moves on a stable
    convex surface, roll and slide occur in the same direction. It is clinically significant
    because manual glides must be applied in the direction of the slide (not the roll)
    to properly restore limited joint range of motion.
  keyPoints: Convex-on-concave vs concave-on-convex, direction of roll and slide,
    therapeutic application.
  clinicalImportance: Guides the correct application direction of manual therapy joint
    mobilization techniques to minimize articular shear.
- id: viva_${chapterId}_${index+1}
  question: Differentiate between normal and pathological end feels, giving a clear
    clinical example of each.
  answer: A normal end feel is the physiological restriction of a joint's motion (e.g.,
    soft tissue approximation in elbow flexion, capsular firm in knee extension, bone-to-bone
    hard in elbow extension). A pathological end feel is abnormal (e.g., empty end
    feel due to severe pain, or a springy block indicating a torn meniscus blocking
    movement).
  keyPoints: Normal vs abnormal types, physical tissue limitations, clinical conditions.
  clinicalImportance: Helps the clinician identify the restricting pathology, helping
    differentiate between articular, extra-articular, inflammatory, or mechanical
    blocks.
- id: viva_${chapterId}_${index+1}
  question: Explain why human joints have changing 'instant centers of rotation' instead
    of static axes of rotation.
  answer: Human joint surfaces are not perfectly symmetrical spheres or cylinders,
    and their movement consists of combined rolling, sliding, and spinning rather
    than simple hinge rotation. Therefore, the axis of rotation shifts dynamically
    throughout the range of motion.
  keyPoints: Non-congruent surfaces, combination of roll/glide, instant center of
    rotation (ICR).
  clinicalImportance: Explains why goniometric alignment requires aligning the moving
    arm with the long axis of the moving bone rather than focusing entirely on a fixed
    fulcrum.
- id: viva_${chapterId}_${index+1}
  question: Define 'Degrees of Freedom' and list the degrees of freedom for the elbow
    joint vs. the hip joint.
  answer: Degrees of freedom refer to the number of independent planes of angular
    movement permitted at a joint. The humeroulnar (elbow) joint is a uniaxial hinge
    joint with 1 degree of freedom (flexion/extension in the sagittal plane). The
    hip joint is a triaxial ball-and-socket joint with 3 degrees of freedom (flexion/extension,
    abduction/adduction, and internal/external rotation).
  keyPoints: Plane definition, uniaxial vs triaxial, joint structural examples.
  clinicalImportance: Guides rehabilitation progression, joint stabilization strategies,
    and assessment of complex multiaxial joint pathologies.
- id: viva_${chapterId}_${index+1}
  question: How do Open Kinematic Chain (OKC) and Closed Kinematic Chain (CKC) exercises
    differ in terms of muscle activation and joint loading?
  answer: In OKC, the distal segment is free, allowing isolated single-joint movement
    and high shear forces. In CKC, the distal segment is fixed to a surface, creating
    multi-joint, coordinated movement that increases joint compression and stimulates
    co-contraction of agonist and antagonist muscles.
  keyPoints: Distal segment status, isolated vs coordinated movement, shear vs compressive
    loading.
  clinicalImportance: Essential for structuring post-operative protocols (e.g., ACL
    reconstruction) where shear forces must be avoided in early healing phases.
- id: viva_${chapterId}_${index+1}
  question: Describe the planes and axes of motion for hip abduction and adduction.
  answer: Hip abduction and adduction occur within the Frontal (Coronal) plane around
    an Anteroposterior (AP) axis that passes horizontally from front to back through
    the center of the femoral head.
  keyPoints: Frontal plane, AP axis, perpendicular orientation of plane and axis.
  clinicalImportance: Crucial for accurate positioning of a patient and goniometer
    during pelvic and hip clinical assessments.
- id: viva_${chapterId}_${index+1}
  question: What is an 'empty' end feel, and what does it indicate to a physiotherapist?
  answer: An empty end feel is a pathological restriction where the clinician cannot
    reach physical end-range resistance because the patient stops the movement due
    to intolerable pain. It indicates acute inflammation, joint infection, active
    bursitis, fracture, or neoplasm.
  keyPoints: Absence of physical barrier, pain-limited stop, serious underlying pathology.
  clinicalImportance: Serves as a red flag, indicating that vigorous stretching or
    joint mobilization is strictly contraindicated.
- id: viva_${chapterId}_${index+1}
  question: Explain the difference between osteokinematics and arthrokinematics.
  answer: Osteokinematics deals with the gross, visible movements of bone shafts in
    space (such as flexion or abduction). Arthrokinematics deals with the small, involuntary
    movements that occur between the opposing joint surfaces (such as rolling, gliding,
    and spinning).
  keyPoints: Bone movement vs joint surface movement, voluntary control vs accessory
    motion.
  clinicalImportance: A joint must have normal arthrokinematics (accessory glide)
    to achieve pain-free, full osteokinematics (active range of motion).
- id: viva_${chapterId}_${index+1}
  question: What are the three primary variables that influence joint Range of Motion
    (ROM)?
  answer: 'Joint range of motion is primarily influenced by: 1. Joint surface geometry
    and congruency. 2. Extensibility of periarticular connective tissues (capsule,
    ligaments, tendons). 3. Muscle bulk and flexibility of overlying musculotendinous
    units.'
  keyPoints: Articular shape, ligamentous/capsular extensibility, muscle tension/bulk.
  clinicalImportance: Directs the therapist's diagnostic tests to identify whether
    a movement restriction is capsular, muscular, or bony in origin.
- id: viva_${chapterId}_${index+1}
  question: What is the neutral-zero method of goniometric measurement, and why is
    it standard?
  answer: The neutral-zero method defines the starting position for all joint range
    of motion measurements as 0 degrees, which corresponds to the anatomical position
    of the joint. It is standard to ensure consistent, reproducible communication
    of joint limitations among healthcare professionals.
  keyPoints: Anatomical starting position, 0-degree reference, standardization.
  clinicalImportance: Prevents misinterpretation of clinical notes and ensures accurate
    tracking of patient recovery progress over time.
