clinicalCorrelations:
  pearls:
  - Applying the concave-convex rule is the foundation of joint mobilization. When
    treating shoulder stiffness with inferior glides, you are physically facilitating
    inferior arthrokinematic sliding to allow the superior roll required for pain-free
    shoulder abduction.
  - An abnormal 'empty' end feel occurs when the patient restricts movement due to
    intense pain before any physical tissue resistance is encountered. This is highly
    suggestive of acute pathology like joint infection, acute bursitis, or underlying
    neoplasm.
  - In goniometric alignment, the fulcrum does not remain perfectly stationary over
    the joint axis throughout the entire range of motion because human joints are
    not perfect hinges; they have instant centers of rotation that shift dynamically.
  - Closed kinematic chain exercises (like squats) are highly functional because they
    mimic weight-bearing daily living activities, stimulate joint mechanoreceptors,
    and evoke coordinated co-contraction of the hamstring and quadriceps groups.
  - Normal firm end feels are produced by tension in joint capsules, ligaments, or
    muscles (e.g., knee extension or ankle dorsiflexion). An early firm end feel suggests
    joint contracture or adaptive shortening of these tissues.
