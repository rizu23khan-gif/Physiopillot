theory:
  definitions:
  - 'Kinematics: The branch of mechanics that describes the motion of a body or segment
    without regard to the forces or torques that cause or result from the motion.'
  - 'Osteokinematics: The study of the gross movement of bones in space relative to
    the three cardinal planes of the body (sagittal, frontal, transverse) during joint
    movement.'
  - 'Arthrokinematics: The study of the microscopic movements that occur between the
    articular surfaces of a joint during osteokinematic motions (roll, slide/glide,
    and spin).'
  - 'Planes of Motion: Intersecting spatial dimensions in which osteokinematic movement
    occurs: Sagittal (divides body into left/right), Frontal/Coronal (divides body
    into front/back), and Transverse/Horizontal (divides body into upper/lower).'
  - 'Axes of Motion: Imaginary pivots around which a bone rotates during movement:
    Mediolateral axis (perpendicular to Sagittal plane), Anteroposterior axis (perpendicular
    to Frontal plane), and Vertical/Longitudinal axis (perpendicular to Transverse
    plane).'
  - 'Degrees of Freedom: The number of independent planes of angular motion permitted
    at a given joint, ranging from one (uniaxial, e.g., humeroulnar joint) to three
    (triaxial, e.g., glenohumeral joint).'
  - 'Roll: An arthrokinematic motion in which multiple points along one rotating articular
    surface contact multiple points along another stationary articular surface, like
    a tire rolling on a road.'
  - 'Glide (Slide): An arthrokinematic motion in which a single point on one sliding
    articular surface contacts multiple points on another articular surface, like
    a locked tire skidding on ice.'
  - 'Spin: An arthrokinematic motion in which a single point on one rotating articular
    surface contacts a single point on another articular surface, rotating around
    a longitudinal axis.'
  - 'Concave-Convex Rule: A fundamental rule of arthrokinematics stating that when
    a convex joint surface moves on a stable concave surface, roll and slide occur
    in opposite directions; conversely, when a concave surface moves on a stable convex
    surface, roll and slide occur in the same direction.'
  - 'Open Kinematic Chain (OKC): A movement configuration where the distal segment
    of an extremity is free to move in space, allowing isolated joint movements and
    non-predictable adjacent joint patterns.'
  - 'Closed Kinematic Chain (CKC): A movement configuration where the distal segment
    of an extremity is fixed or stabilized against a surface, forcing predictable,
    synchronized motion across all joint segments in the chain.'
  - 'Goniometry: The clinical technique of measuring the angles of human joint ranges
    of motion using a specialized instrument (goniometer) aligned with anatomical
    bony landmarks.'
  - 'End Feel: The quality of resistance felt by the clinician at the extreme end
    of passive range of motion, categorized as normal (soft, firm, hard) or abnormal/pathological
    (empty, boggy, springy block, or early/late muscle spasm).'
  - 'Joint Play: The small, involuntary accessory movements (such as gliding, rolling,
    and spinning) that occur between joint surfaces during normal osteokinematic motion.
    It is not under voluntary control but is essential for pain-free joint function.'
  - 'Close-Packed Position: The joint position where the articular surfaces are maximally
    congruent, the joint capsule and major ligaments are maximally taut, and the joint
    is locked and mechanically most stable.'
  - 'Loose-Packed (Resting) Position: Any joint position other than the close-packed
    position; specifically, the position of maximum resting where the joint capsule
    and ligaments are most slack, allowing maximum joint play and greatest joint cavity
    volume.'
  - 'Capsular Pattern: A specific, predictable pattern of proportionate limitation
    in joint range of motion (described by Cyriax) indicating that the entire joint
    capsule is involved, such as in arthritis or capsulitis.'
  coreConcepts:
  - 'Cardinal Planes and Axes Relationship: Osteokinematic rotation always occurs
    within a plane of motion and around an axis that is perpendicularly oriented to
    that plane (e.g., flexion/extension occurs in the sagittal plane around a mediolateral
    axis).'
  - 'Application of the Concave-Convex Rule: Understanding the direction of glide
    relative to roll is essential for manually restoring joint range of motion. For
    example, to restore shoulder abduction (convex humeral head moving on concave
    glenoid fossa), manual glide must be applied in the inferior direction (opposite
    of the superior osteokinematic roll).'
  - 'Joint Constraint and Degrees of Freedom: The anatomical geometry of the joint
    surfaces and the arrangement of surrounding collateral ligaments dictate the joint''s
    degrees of freedom and protect it from non-physiological translations.'
  - 'Kinematic Chain Load Distribution: Closed kinematic chain movements distribute
    weight-bearing loads across multiple joint systems, evoking co-contraction of
    muscle groups and reducing shear stresses on individual ligaments.'
  - 'End Feel Interpretation: Clinicians assess end feel to evaluate the physiological
    structures restricting joint movement. A hard end feel represents bone-to-bone
    contact, a firm end feel represents capsular or ligamentous tension, and a soft
    end feel represents soft tissue approximation.'
  - 'Clinical Significance of Joint Play: Normal joint play is a prerequisite for
    full, pain-free osteokinematic movement. Loss of joint play (accessory motion)
    results in restricted active and passive range of motion, and attempting to force
    osteokinematic motion without restoring joint play causes pain and cartilage damage.'
  - 'Application of Loose-Packed Position: Because the loose-packed position allows
    for maximum joint play and minimal capsular tension, it is the optimal position
    for clinical assessment of joint mobility and the application of manual joint
    mobilization techniques.'
  - 'Characteristics of Close-Packed Position: In this mechanically stable position,
    joint cavity volume is minimized, and the joint cannot be easily distracted. It
    is the position most susceptible to injury from external forces due to the lack
    of ''give'' in the taut capsuloligamentous structures.'
  - 'Capsular Pattern Assessment (Cyriax Concept): Identifying a capsular pattern
    helps clinicians differentiate between total joint pathology (like osteoarthritis)
    and non-capsular lesions (like muscle strains). For example, the classic capsular
    pattern of the shoulder exhibits the greatest restriction in external rotation,
    followed by abduction, and then internal rotation.'
  - Universal Goniometer (360-degree and 180-degree variations) for measuring joint
    angles.
  - Inclinometers and Digital Goniometers for spine and extremity range of motion
    analysis.
  - Gravity-dependent goniometers (bubble inclinometers) for precise neck and trunk
    measurements.
