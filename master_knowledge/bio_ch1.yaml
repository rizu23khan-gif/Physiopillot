subjectExtensions:
  anatomy:
    parameters:
      goniometerAlignment: Stationary arm parallel to proximal bone axis, moving arm
        parallel to distal bone axis, fulcrum over joint axis.
      goniometerError: Acceptable clinical goniometry measurement error is typically
        +/- 5 degrees.
      guniometerStandard: Neutral-Zero Method (starting all joint range of motion
        measurements at 0 degrees).
