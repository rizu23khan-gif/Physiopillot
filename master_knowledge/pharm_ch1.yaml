subjectExtensions:
  anatomy:
    parameters:
      Therapeutic Index Equation: LD50 / ED50 (Lethal Dose 50 / Effective Dose 50)
      IV Bioavailability: 100%
      First-Pass Metabolism Organs: Liver (primary), Gastrointestinal wall
      Albumin Binding Function: Acts as a drug reservoir; only free drug is active
