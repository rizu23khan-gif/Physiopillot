mcqs:
- id: mcq_pharm_ch1_001
  question: A 68-year-old female patient with osteoarthritis is referred to physiotherapy
    for balance and gait training. During your subjective assessment, you note that
    she was recently prescribed a centrally acting muscle relaxant (Diazepam) for
    severe muscle spasms. Which of the following is the most critical safety assessment
    to perform prior to initiating standing balance exercises?
  options:
  - Manual muscle testing of the quadriceps
  - Active range of motion of the hip
  - Orthostatic blood pressure and balance assessment
  - Sensory testing of the lower extremity
  answer: Orthostatic blood pressure and balance assessment
  explanation: Centrally acting muscle relaxants like diazepam enhance GABA-mediated
    inhibition in the CNS, causing sedation, motor impairment, and vasodilation. This
    significantly increases the risk of orthostatic hypotension and falls, especially
    in geriatric patients. Checking orthostatic vitals and initial balance is the
    top priority for safety.
- id: mcq_pharm_ch1_002
  question: An athlete is taking oral Ibuprofen (NSAID) to manage patellar tendinitis.
    They ask you when they should take their medication relative to their physical
    therapy session. Based on pharmacokinetics, what is the most appropriate recommendation?
  options:
  - Immediately before starting the exercise session
  - Approximately 1 hour before the session to align with peak plasma concentration
  - Directly after the session to prevent any post-exercise soreness
  - Only at night before sleeping to allow tissue repair
  answer: Approximately 1 hour before the session to align with peak plasma concentration
  explanation: Most oral NSAIDs like ibuprofen take about 1 to 2 hours to reach peak
    plasma concentration (t-max) and produce maximum analgesic effect. Coordinating
    ingestion to be roughly 1 hour before physical therapy allows the patient to exercise
    with optimal pain relief, improving rehabilitation compliance.
- id: mcq_pharm_ch1_003
  question: A patient has been taking high-dose oral prednisolone (a corticosteroid)
    for 6 months to manage rheumatoid arthritis. During physical therapy, which of
    the following exercises should be prescribed with extreme caution due to the drug's
    physiological effects on connective tissue?
  options:
  - Low-resistance isometric quadriceps strengthening
  - Gentle active-assisted knee range of motion
  - High-load, rapid eccentric Achilles tendon loading
  - Closed-chain proprioceptive standing exercises
  answer: High-load, rapid eccentric Achilles tendon loading
  explanation: Chronic glucocorticoid use leads to systemic collagen catabolism, decreasing
    the tensile strength of tendons, ligaments, and bones. High-load, high-velocity
    eccentric movements pose a severe risk of spontaneous tendon rupture (especially
    Achilles tendinopathy) and must be avoided or progressed very conservatively.
- id: mcq_pharm_ch1_004
  question: If a drug has a very high first-pass metabolism, which of the following
    statements is TRUE regarding its oral administration?
  options:
  - Its oral bioavailability will be high
  - Its oral dose will need to be significantly higher than its intravenous dose
  - It will bypass the portal circulation and enter systemic blood directly
  - It should never be administered orally under any circumstances
  answer: Its oral dose will need to be significantly higher than its intravenous
    dose
  explanation: High first-pass metabolism means that a substantial fraction of the
    orally administered drug is metabolized in the liver or gut wall before entering
    systemic circulation. To achieve therapeutic systemic concentrations, the oral
    dose must be much larger than the IV dose (which bypasses first-pass metabolism
    entirely with 100% bioavailability).
- id: mcq_pharm_ch1_005
  question: Which of the following terms describes the maximal therapeutic effect
    that a drug can produce, regardless of the dose administered?
  options:
  - Drug Potency
  - Drug Efficacy
  - Therapeutic Index
  - Bioavailability
  answer: Drug Efficacy
  explanation: Efficacy is the maximum response achievable from a drug. It is represented
    by the plateau (Emax) of the graded dose-response curve. Potency, on the other
    hand, refers to the dose required to produce a specific sub-maximal response.
- id: mcq_pharm_ch1_006
  question: A physiotherapist is treating a patient who is taking Warfarin (an anticoagulant)
    for atrial fibrillation. During manual therapy, which of the following interventions
    is CONTRAINDICATED due to the safety risks associated with this drug?
  options:
  - Gentle myofascial release of the upper trapezius
  - Deep transverse friction massage and aggressive instrument-assisted soft tissue
    mobilization (IASTM)
  - Active range of motion of the shoulder joint
  - Low-intensity passive stretching of the pectoralis major
  answer: Deep transverse friction massage and aggressive instrument-assisted soft
    tissue mobilization (IASTM)
  explanation: Warfarin increases bleeding and clotting time by inhibiting vitamin
    K-dependent clotting factors. Aggressive manual techniques such as deep transverse
    friction massage, deep tissue work, or IASTM apply high shear forces to tissue
    and capillaries, risking extensive subcutaneous bruising, bleeding, and hematoma
    formation.
- id: mcq_pharm_ch1_007
  question: A patient with Parkinson's Disease experiences severe bradykinesia and
    dynamic instability during their physical therapy sessions. What is the most effective
    clinical scheduling strategy to optimize their rehabilitation outcomes?
  options:
  - Schedule sessions early in the morning before they take their first dose of Levodopa
  - Schedule sessions 60-90 minutes after Levodopa administration to coincide with
    the therapeutic 'On' phase
  - Schedule sessions late in the afternoon when drug concentration is lowest to train
    natural reflexes
  - Schedule sessions immediately after lunch when digestion is highest
  answer: Schedule sessions 60-90 minutes after Levodopa administration to coincide
    with the therapeutic 'On' phase
  explanation: Levodopa typically takes 1 to 1.5 hours to reach peak plasma levels
    and cross the blood-brain barrier to be converted into dopamine. Coordinating
    physiotherapy sessions with this peak 'On' phase maximizes the patient's motor
    control, decreases rigidity and freezing of gait, and enhances safety and motor
    learning.
- id: mcq_pharm_ch1_008
  question: The Therapeutic Index (TI) of a drug is defined as the ratio of TD50 (median
    toxic dose) or LD50 (median lethal dose) to ED50 (median effective dose). Which
    of the following drugs requires the most rigorous clinical and laboratory monitoring
    due to its narrow Therapeutic Index?
  options:
  - Penicillin G
  - Amoxicillin
  - Warfarin
  - Paracetamol
  answer: Warfarin
  explanation: Warfarin has a narrow therapeutic index, meaning the dose that prevents
    blood clots is very close to the dose that causes life-threatening internal bleeding.
    This necessitates frequent monitoring of the International Normalized Ratio (INR)
    and extreme caution during physical therapies.
