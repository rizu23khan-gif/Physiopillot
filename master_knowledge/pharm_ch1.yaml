theory:
  definitions:
  - 'Pharmacology: The science of drugs, encompassing their sources, chemical properties,
    biological effects, mechanisms of action, therapeutic uses, and adverse effects.'
  - 'Pharmacokinetics: The quantitative study of drug movement into, through, and
    out of the body (what the body does to the drug), comprising absorption, distribution,
    metabolism, and excretion (ADME).'
  - 'Pharmacodynamics: The study of the biochemical and physiological effects of drugs
    and their mechanisms of action (what the drug does to the body).'
  - 'Bioavailability: The rate and extent to which the active drug ingredient is absorbed
    from a drug product and becomes available at the site of drug action or in systemic
    circulation.'
  - 'First-Pass Metabolism: The rapid clearance or degradation of an orally administered
    drug by liver enzymes or gastrointestinal walls before it reaches systemic circulation,
    reducing its bioavailability.'
  - 'Therapeutic Index (TI): The ratio of the dose that produces toxicity (TD50 or
    LD50) to the dose that produces a clinically effective response (ED50) in a population.
    It measures drug safety.'
  - 'Drug Potency: The amount of drug (usually in milligrams) required to produce
    an effect of a given intensity; a highly potent drug produces its response at
    low concentrations.'
  - 'Drug Efficacy: The maximum biological response achievable from a drug, regardless
    of the dose required (also known as intrinsic activity).'
  - 'Essential Medicines: Drugs that satisfy the priority healthcare needs of the
    population, selected with due regard to public health relevance, evidence on efficacy
    and safety, and comparative cost-effectiveness.'
  coreConcepts:
  - 'Pharmacokinetic Phase - Absorption: Drug absorption is the movement of a drug
    from its site of administration into the blood circulation. It depends on aqueous
    solubility, lipid solubility, molecular size, and blood flow to the absorption
    site.'
  - 'CONCEPT BUILDER: Why Oral Drugs Sometimes Fail

    Oral drugs must survive the highly acidic gastric environment, digestive enzymes
    in the duodenum, and first-pass metabolism in the liver. In conditions of gastrointestinal
    hypermotility (diarrhea), malabsorption syndrome, or after major bowel resection,
    oral drug absorption is severely impaired, leading to therapeutic failure. Physiotherapists
    should note that strenuous exercise immediately after oral drug intake can divert
    blood flow away from the GI tract to active skeletal muscles, further delaying
    absorption.'
  - 'Pharmacokinetic Phase - Distribution: Distribution is the reversible transfer
    of a drug between one compartment and another (usually from the vascular space
    to interstitial and cellular spaces in tissues).'
  - 'CONCEPT BUILDER: Plasma Protein Binding & Drug Storage

    Drugs bind reversibly to plasma proteins, primarily albumin. Only the unbound,
    ''free'' drug is pharmacologically active and capable of diffusing into target
    tissues. Highly protein-bound drugs (e.g., warfarin, NSAIDs) can displace each
    other when co-administered, resulting in a sudden spike in active drug levels
    and potential toxicities like bruising or gastrointestinal bleeding.'
  - 'Pharmacokinetic Phase - Metabolism (Biotransformation): The chemical alteration
    of drugs in the body, primarily in the liver, turning lipid-soluble compounds
    into water-soluble metabolites for renal excretion. This involves Phase I (oxidation,
    reduction, hydrolysis) and Phase II (conjugation) reactions.'
  - 'CONCEPT BUILDER: First Pass Metabolism vs. IV Bypass

    When a drug is swallowed, it enters the portal vein and goes straight to the liver
    before reaching the heart and systemic tissues. The liver may destroy or metabolize
    up to 90% of the active drug (high first-pass effect). Intravenous (IV) administration
    bypasses this entirely, delivering 100% of the drug directly into the systemic
    circulation. This is why IV drugs work almost instantly and require lower doses
    than oral equivalents.'
  - 'Pharmacokinetic Phase - Excretion: The irreversible removal of drugs and their
    metabolites from the body, primarily via glomerular filtration, active tubular
    secretion, and passive tubular reabsorption in the kidneys.'
  - 'CONCEPT BUILDER: Why Some Drugs Require Repeated Dosing (Half-Life)

    The elimination half-life (t1/2) is the time required for the plasma concentration
    of a drug to decrease by 50%. Drugs with short half-lives (e.g., ibuprofen, t1/2
    ~ 2 hours) are cleared rapidly and require repeated dosing to maintain therapeutic
    blood levels. Drugs with long half-lives (e.g., diazepam) persist for days, meaning
    single doses can have prolonged physiological effects, including sedation and
    motor coordination deficits relevant to physiotherapy sessions.'
  - 'Pharmacodynamics - Receptor Theory: Most drugs act by binding to specific regulatory
    macromolecules called receptors, triggering a cascade of intracellular signals
    that alter cell function. Receptors are classified into ion channels, GPCRs, enzymatic,
    and intracellular receptors.'
  - 'CONCEPT BUILDER: Potency vs. Efficacy Explained

    Potency refers to the dose required to produce an effect, whereas efficacy is
    the maximum possible effect a drug can produce. For example, morphine is highly
    potent (requires small doses for pain relief) and highly effective (can treat
    severe pain). Aspirin is less potent and has lower efficacy (cannot relieve severe
    visceral pain, no matter how much dose is given). In clinical practice, efficacy
    is far more important than potency.'
  - 'Adverse Drug Reactions (ADRs): Any noxious, unintended, and undesired effect
    of a drug that occurs at doses used for prevention, diagnosis, or therapy. These
    include side effects, toxic effects, allergic reactions, and idiosyncratic reactions.'
  - 'CONCEPT BUILDER: Why Overdoses Occur & The Therapeutic Index

    Drugs with a narrow Therapeutic Index (e.g., digoxin, lithium, warfarin) have
    a very small safety margin. The dose required to produce a therapeutic effect
    is close to the toxic dose. Overdoses or toxicities can easily occur due to minor
    dosage adjustments, drug-drug interactions, dehydration, or declining renal/hepatic
    function in elderly patients.'
  - 'Rehabilitation-Specific Principle: Drug-Exercise Interactions

    The physiological response to exercise can significantly alter pharmacokinetics.
    Exercise-induced heat generation, elevated core body temperature, and increased
    regional blood flow at the injection site (e.g., insulin injected into a thigh
    before running) can accelerate drug absorption dramatically, causing severe systemic
    reactions like hypoglycemic shock.'
