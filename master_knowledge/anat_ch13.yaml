theory:
  definitions:
  - 'Joints of the Hand Complex: A highly sophisticated collection of articulations
    coordinating high-level prehensive dexterous actions. Includes: 1) Wrist (Radiocarpal)
    Joint, 2) Midcarpal and Intercarpal joints, 3) Carpometacarpal (CMC) joints, 4)
    Metacophalangeal (MCP) joints, and 5) Interphalangeal (IP) joints.'
  - The 1st Carpometacarpal Joint of the thumb is a highly specialized saddle (sellar)
    joint that allows unique opposition, elevating human hand functionality above
    other primates.
  coreConcepts:
  - 'Wrist (Radiocarpal) Joint: A synovial ellipsoid (condyloid) joint. Formed by
    the distal end of the radius and the triangular fibrocartilage articular disc
    of the distal radioulnar joint articulating with the scaphoid, lunate, and triquetrum
    bones. The ulna is excluded from direct wrist joint contact by the articular disc.'
  - 'First Carpometacarpal Joint: A joint possessing reciprocal concave-convex saddle-shaped
    surfaces between the Trapezium and the base of the First Metacarpal. It permits
    movements in multiple planes: flexion-extension, abduction-adduction, and rotation,
    which combine to produce opposition.'
  - 'Metacarpophalangeal (MCP) and Interphalangeal (IP) Joint Mechanics: MCP joints
    are condyloid joints allowing flexion, extension, abduction, adduction, and circumduction.
    IP joints (Proximal and Distal) are pure hinge joints restricted to flexion and
    extension, stabilized by palmar ligaments (plates) and collateral ligaments.'
  - 'Wrist Motion Bio-mechanics: Wrist flexion (powered by Flexor Carpi Radialis and
    Flexor Carpi Ulnaris) and extension (powered by Extensor Carpi Radialis Longus,
    Brevis, and Extensor Carpi Ulnaris) are glide actions taking place at both the
    radiocarpal and midcarpal joint planes.'
  equipment:
  - Radiocarpal Articulation (Ellipsoid joint for wrist flexion, extension, deviation)
  - First Carpometacarpal Joint (Saddle joint allowing thumb opposition)
  - Metacarpophalangeal Joints (Condyloid joints permitting digit splay)
  - Proximal Interphalangeal Joints (Synovial hinge joints with ulnar/radial collaterals)
  - Distal Interphalangeal Joints (Synovial hinge joints with palmar plates)
  - Wrist Collateral Ligaments (Radial and ulnar styloid anchor strips)
  - Palmar Ligaments / Plates (Prevent finger hyperextension injuries)
  - Scapholunate Interosseous Ligament (Main stability bridge of proximal carpus row)
clinicalCorrelations:
  pearls:
  - 'Colles'' vs Smith''s Fractures: A Colles'' fracture is a fracture of the distal
    radius resulting from a fall on an outstretched hand, displacing the distal bone
    fragment posteriorly (dinner fork deformity). A Smith''s fracture results from
    a fall on a flexed wrist, displacing the distal fragment anteriorly (garden spade
    deformity).'
  - 'Scaphoid Fracture & Avascular Necrosis (AVN): The scaphoid is the most commonly
    fractured carpal bone. Because its blood supply enters retrogradely from its distal
    pole, fractures at the waist of the scaphoid cut off blood flow to the proximal
    fragment, leading to delayed union, non-union, or avascular necrosis.'
  - 'Skier''s / Gamekeeper''s Thumb: An injury characterized by rupture of the Ulnar
    Collateral Ligament (UCL) of the first metacarpophalangeal (MCP) joint of the
    thumb, often caused by hyperabduction hyper-forces (such as a ski pole strap pulling
    on the thumb during a fall).'
