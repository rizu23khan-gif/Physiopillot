mcqs:
- id: mcq_anat_ch13_001
  question: Which of the following bones participates directly in the radiocarpal
    (wrist) joint?
  options:
  - Ulna
  - Scaphoid and Lunate
  - Pisiform
  - Trapezium
  answer: Scaphoid and Lunate
  explanation: The proximal row carpal bones, specifically the scaphoid and lunate
    (along with part of triquetrum), articulate directly with the distal end of the
    radius.
- id: mcq_anat_ch13_002
  question: What structure completely excludes the distal end of the ulna from directly
    participating in the wrist joint?
  options:
  - Flexor retinaculum
  - Interosseous membrane
  - Articular disc (Triangular fibrocartilage)
  - Radial collateral ligament
  answer: Articular disc (Triangular fibrocartilage)
  explanation: A horizontal triangular articular disc separates the head of the ulna
    from the cavity of the radiocarpal wrist joint.
- id: mcq_anat_ch13_003
  question: The first carpometacarpal joint of the thumb represents which structural
    class of synovial joint?
  options:
  - Saddle (Sellar) joint
  - Ball and socket
  - Pivot joint
  - Condyloid joint
  answer: Saddle (Sellar) joint
  explanation: The 1st CMC joint of the thumb is a classic saddle (sellar) synovial
    joint, characterized by mutually concave-convex articulating surfaces.
- id: mcq_anat_ch13_004
  question: A Colles' fracture is characterized by a distal radius fracture with displacement
    in which direction?
  options:
  - Dorsal and superior (Dinner fork deformity)
  - Palmar and inferior (Garden spade deformity)
  - Medial and rotational ulnar deviation
  - No displacement
  answer: Dorsal and superior (Dinner fork deformity)
  explanation: A Colles' fracture is caused by falling on an outstretched, extended
    hand, displacing the distal radial fragment dorsally and superiorly, resembling
    a dinner fork.
- id: mcq_anat_ch13_005
  question: Which deformity is produced by a Smith's fracture of the distal radius?
  options:
  - Dinner fork deformity
  - Garden spade deformity
  - Claw hand deformity
  - Ape hand deformity
  answer: Garden spade deformity
  explanation: A Smith's fracture is a reverse Colles' fracture, caused by a fall
    on a flexed wrist. The distal fragment is displaced palmarly, producing the garden
    spade deformity.
- id: mcq_anat_ch13_006
  question: What is the most frequently fractured carpal bone in the human wrist?
  options:
  - Lunate
  - Hamate
  - Scaphoid
  - Pisiform
  answer: Scaphoid
  explanation: The scaphoid is the most common carpal bone injured, typically fractured
    across its narrow waist from a fall on an outstretched hand.
- id: mcq_anat_ch13_007
  question: Why are fractures of the proximal pole of the scaphoid highly prone to
    avascular necrosis?
  options:
  - The proximal pole lacks a cartilage covering
  - The bone blood supply enters retrogradely from the distal pole
  - The lunate compresses the proximal pole
  - The radial artery does not supply the wrist
  answer: The bone blood supply enters retrogradely from the distal pole
  explanation: Because scaphoid nutrient vessels enter retrogradely at the waist/distal
    pole, a proximal pole fragment is deprived of arterial supply and is highly prone
    to AVN.
- id: mcq_anat_ch13_008
  question: 'Rupture of the ulnar collateral ligament of the first metacarpophalangeal
    joint of the thumb is clinically called:'
  options:
  - Trigger finger
  - Skier's (Gamekeeper's) thumb
  - Dupuytren's contracture
  - Mallet thumb
  answer: Skier's (Gamekeeper's) thumb
  explanation: Skier's (or Gamekeeper's) thumb describes a traumatic tear or avulsion
    of the ulnar collateral ligament of the thumb's MCP joint.
- id: mcq_anat_ch13_009
  question: 'In a Swan-neck finger deformity, the joint positions are defined as:'
  options:
  - PIP flexion with DIP extension
  - PIP hyperextension with DIP flexion
  - MCP flexion with PIP extension
  - MCP hyperextension with distal clawing
  answer: PIP hyperextension with DIP flexion
  explanation: Swan-neck deformity is characterized by hyperextension at the proximal
    interphalangeal (PIP) joint combined with flexion at the distal interphalangeal
    (DIP) joint.
- id: mcq_anat_ch13_010
  question: A Boutonniere deformity consists of which joint position combination?
  options:
  - PIP flexion with DIP hyperextension
  - PIP hyperextension with DIP flexion
  - MCP hyperextension with PIP flexion
  - DIP flexion with normal PIP
  answer: PIP flexion with DIP hyperextension
  explanation: Boutonniere deformity is characterized by persistent flexion of the
    PIP joint combined with hyperextension of the DIP joint, often caused by a rupture
    of the central slip of the extensor tendon.
- id: mcq_anat_ch13_011
  question: Flexion and extension of the thumb occur in which anatomical plane relative
    to the palm?
  options:
  - Sagittal plane (perpendicular to the palm)
  - Coronal plane (parallel to the palm)
  - Transverse plane
  - Horizontal plane
  answer: Coronal plane (parallel to the palm)
  explanation: Thumb flexion/extension movements occur within the coronal plane, parallel
    to the flat surface of the palm.
- id: mcq_anat_ch13_012
  question: Thumb abduction and adduction occur in which anatomical plane relative
    to the palm?
  options:
  - Sagittal plane (perpendicular to the palm)
  - Coronal plane (parallel to the palm)
  - Transverse plane
  - Oblique plane
  answer: Sagittal plane (perpendicular to the palm)
  explanation: Thumb abduction/adduction movements project anteriorly-posteriorly
    within the sagittal plane, perpendicular to the palm.
- id: mcq_anat_ch13_013
  question: The wrist (radiocarpal) joint belongs to which class of synovial joint?
  options:
  - Plane joint
  - Pivot joint
  - Ellipsoid (Condyloid) joint
  - Ball and socket
  answer: Ellipsoid (Condyloid) joint
  explanation: The radiocarpal joint is an ellipsoid/condyloid joint, permitting biaxial
    movement (flexion/extension and abduction/adduction) but restricting rotation.
- id: mcq_anat_ch13_014
  question: What is the primary muscle responsible for active ulnar deviation (adduction)
    of the wrist?
  options:
  - Flexor carpi radialis
  - Extensor carpi radialis longus
  - Flexor carpi ulnaris and Extensor carpi ulnaris
  - Brachioradialis
  answer: Flexor carpi ulnaris and Extensor carpi ulnaris
  explanation: Ulnar deviation (adduction of the wrist) is produced by the coordinated
    co-contraction of the Flexor Carpi Ulnaris and Extensor Carpi Ulnaris muscles.
- id: mcq_anat_ch13_015
  question: Which muscles are responsible for producing active radial deviation (abduction)
    of the wrist?
  options:
  - Flexor carpi radialis and Extensor carpi radialis longus/brevis
  - Flexor carpi ulnaris and Extensor carpi ulnaris
  - Pronator teres and supinator
  - Palmaris longus
  answer: Flexor carpi radialis and Extensor carpi radialis longus/brevis
  explanation: Radial devation (abduction) is driven by the co-contraction of the
    Flexor Carpi Radialis and the Extensor Carpi Radialis muscles on the lateral wrist.
- id: mcq_anat_ch13_016
  question: Which carpal ligament is typically torn or stretched in a clinical 'wrist
    sprain' from a fall?
  options:
  - Palmar radiocarpal ligament
  - Transverse carpal ligament
  - Oblique cord
  - Annular ligament
  answer: Palmar radiocarpal ligament
  explanation: The palmar radiocarpal ligaments are strong stabilizing bands on the
    anterior wrist that are commonly stretched or micro-torn during falls.
- id: mcq_anat_ch13_017
  question: What carpal joint lies between the proximal and distal rows of carpal
    bones?
  options:
  - Radiocarpal joint
  - Midcarpal joint
  - Carpometacarpal joint
  - Distal radioulnar joint
  answer: Midcarpal joint
  explanation: The midcarpal joint is the continuous S-shaped articular plane separating
    the proximal and distal rows of carpal bones.
- id: mcq_anat_ch13_018
  question: Which carpal bone is the largest and occupies the center of the distal
    row?
  options:
  - Scaphoid
  - Lunate
  - Capitate
  - Hamate
  answer: Capitate
  explanation: The Capitate is the largest of the carpal bones, sitting centrally
    within the distal carpal row and articulating with the third metacarpal.
- id: mcq_anat_ch13_019
  question: Which synovial joint class permits flexion and extension but strictly
    blocks side-to-side abduction at the fingers?
  options:
  - Metacarpophalangeal
  - Interphalangeal (Proximal & Distal)
  - First carpometacarpal
  - Midcarpal
  answer: Interphalangeal (Proximal & Distal)
  explanation: Interphalangeal joints are pure uniaxial pivot hinge joints that allow
    only flexion and extension.
- id: mcq_anat_ch13_020
  question: What thick fibrocartilaginous structures prevent hyperextension of the
    interphalangeal joints?
  options:
  - Collateral ligaments
  - Palmar ligaments (plates)
  - Cruciate ligaments
  - Retinacula
  answer: Palmar ligaments (plates)
  explanation: The palmar plates are thick, cartilaginous reinforcements on the anterior
    aspect of the IP and MCP joints that limit extension and prevent hyperextension.
- id: mcq_anat_ch13_021
  question: Which ligament is primary in resisting varus and valgus separation at
    the interphalangeal joints?
  options:
  - Palmar plates
  - Collateral ligaments
  - Transverse carpal ligament
  - Digital sheaths
  answer: Collateral ligaments
  explanation: Strong medial and lateral collateral ligaments stabilize the sides
    of the PIP and DIP joints, preventing lateral joint deviation during grasp.
- id: mcq_anat_ch13_022
  question: ' dislocation of which carpal bone can compress the median nerve inside
    the carpal tunnel?'
  options:
  - Scaphoid
  - Lunate
  - Triquetrum
  - Pisiform
  answer: Lunate
  explanation: Anterior (palmar) dislocation of the Lunate pushes the bone directly
    into the carpal tunnel, compressing the containing structures, particularly the
    median nerve.
- id: mcq_anat_ch13_023
  question: What is the primary stabilizer of the thumb's 1st CMC joint, resisting
    dorsal subluxation during pinch grip?
  options:
  - Anterior oblique (beak) ligament
  - Ulnar collateral ligament
  - Transverse carpal ligament
  - Oblique cord
  answer: Anterior oblique (beak) ligament
  explanation: The anterior oblique ligament (beak ligament) of the 1st CMC joint
    is the key stabilizer holding the metacarpal base against the trapezium fovea
    during pinch.
- id: mcq_anat_ch13_024
  question: Degenerative osteoarthritis of the hand is most common at which joint?
  options:
  - 2nd Metacarpophalangeal joint
  - 1st Carpometacarpal joint (base of thumb)
  - Midcarpal joint
  - Proximal ulnohumeral joint
  answer: 1st Carpometacarpal joint (base of thumb)
  explanation: The 1st CMC joint is highly susceptible to wear and tear from high
    mechanical loads, making it the most common site of osteoarthritis in the hand.
- id: mcq_anat_ch13_025
  question: The articular disc of the distal radioulnar joint attaches primarily to
    which anatomical feature?
  options:
  - Ulnar styloid process base and radius ulnar notch
  - Triquetrum bone and pisiformbone
  - Distal end of the first metacarpal
  - Scaphoid tubercle
  answer: Ulnar styloid process base and radius ulnar notch
  explanation: The triangular fibrocartilage disc (TFCC) extends from the margin of
    the ulnar notch of the distal radius to the base of the ulnar styloid process.
- id: mcq_anat_ch13_026
  question: Which ligament is check-stretched during active radial deviation (wrist
    abduction)?
  options:
  - Radial collateral carpal ligament
  - Ulnar collateral carpal ligament
  - Palmar radiocarpal ligament
  - Oblique cord
  answer: Ulnar collateral carpal ligament
  explanation: Ulnar collateral ligaments on the medial side of the wrist are stretched
    and tightened during lateral abduction (radial deviation) of the wrist.
- id: mcq_anat_ch13_027
  question: 'A physical therapist detects laxity when applying a valgus stress to
    the patient''s thumb MCP joint. This indicates injury to:'
  options:
  - Radial collateral ligament
  - Ulnar collateral ligament (Skier's thumb)
  - Palmar plate
  - Adductor aponeurosis
  answer: Ulnar collateral ligament (Skier's thumb)
  explanation: A valgus stress test assesses the integrity of the medial/ulnar collateral
    ligament of the thumb MCP joint, which is injured in skier's thumb.
- id: mcq_anat_ch13_028
  question: Which muscles are actively lengthening during the performance of a clean
    wrist extension?
  options:
  - Extensor carpi ulnaris
  - Extensor carpi radialis longus
  - Flexor carpi radialis and Flexor carpi ulnaris
  - Brachioradialis
  answer: Flexor carpi radialis and Flexor carpi ulnaris
  explanation: During wrist extension, the antagonist wrist flexor muscles (Flexor
    Carpi Radialis and Flexor Carpi Ulnaris) actively lengthen.
- id: mcq_anat_ch13_029
  question: During finger abduction, the MCP joints are in which physiological position
    to allow the maximum range?
  options:
  - Full flexion
  - Full extension
  - Rotated position
  - Fully supinated
  answer: Full extension
  explanation: In MCP extension, the collateral ligaments are loose, which allows
    side-to-side abduction. In MCP flexion, the collateral ligaments are tight, blocking
    abduction.
- id: mcq_anat_ch13_030
  question: Trigger finger (stenosing tenosynovitis) typically occurs due to a size
    mismatch at which structural pulley of the hand?
  options:
  - A1 Pulley
  - A5 Pulley
  - C3 Pulley
  - Palmar aponeurosis
  answer: A1 Pulley
  explanation: Trigger finger involves a mismatch between the flexor tendon and the
    A1 pulley at the level of the metacarpal head, causing the finger to catch or
    lock in flexion.
viva:
- id: viva_anat_ch13_001
  question: Describe the articulating surfaces of the wrist (radiocarpal) joint and
    state if the ulna is included.
  answer: The wrist joint is formed by the distal end of the radius and the inferior
    surface of the articular disc (TFCC) articulating with the proximal surfaces of
    the scaphoid, lunate, and triquetrum carpal bones. The ulna is completely excluded
    from the wrist joint by the articular disc.
  keyPoints: Distal radius, articular disc fovea, scaphoid, lunate, triquetrum, ulna
    excluded.
  clinicalImportance: Explains why ulnar variance alterations can overload the TFCC
    disc, causing medial wrist pain.
- id: viva_anat_ch13_002
  question: What makes the first carpometacarpal joint of the thumb unique, and what
    class of joint is it?
  answer: The first carpometacarpal joint is a saddle (sellar) synovial joint formed
    between the trapezium and the base of the first metacarpal. It has reciprocal
    concavo-convex surfaces that permit flexion, extension, abduction, adduction,
    and axial rotation, which combine to produce opposition.
  keyPoints: Saddle/sellar joint, trapezium and 1st metacarpal, opposition.
  clinicalImportance: Osteoarthritis commonly affects this joint, limiting grip strength
    and pinch functions.
- id: viva_anat_ch13_003
  question: Differentiate a Colles' fracture from a Smith's fracture regarding displacement
    and mechanism.
  answer: A Colles' fracture is a distal radius fracture from falling on an outstretched
    hand (wrist extension), displacing the distal fragment dorsally and superiorly
    (dinner fork deformity). A Smith's fracture (reverse Colles') occurs from falling
    on the back of a flexed wrist, displacing the fragment palmarly (garden spade
    deformity).
  keyPoints: Extension fall vs flexion fall, dorsal displacement (Colles') vs palmar
    displacement (Smith's).
  clinicalImportance: Crucial for determining immobilization splint positions and
    physical therapy ROM stages.
- id: viva_anat_ch13_004
  question: Why does a fracture at the waist of the scaphoid carry a high risk of
    avascular necrosis?
  answer: The arterial blood supply of the scaphoid enters retrogradely through its
    distal pole and waist to reach the proximal pole. A fracture across the scaphoid
    waist tears these intraosseous vessels, depriving the proximal fragment of blood,
    leading to avascular necrosis.
  keyPoints: Retrograde blood supply, proximal pole ischemia, waist fracture.
  clinicalImportance: Requires prolonged cast immobilization or surgical screw fixation
    to support bone healing.
- id: viva_anat_ch13_005
  question: What is Skier's (Gamekeeper's) Thumb, and which ligament is injured?
  answer: It is a rupture or avulsion of the Ulnar Collateral Ligament (UCL) of the
    1st metacarpophalangeal (MCP) joint of the thumb, caused by forced hyperabduction.
  keyPoints: 1st MCP joint, ulnar collateral ligament, hyperabduction.
  clinicalImportance: Results in unstable pinch grip; severe tears require surgery
    to avoid permanent hand weakness.
- id: viva_anat_ch13_006
  question: Name the rheumatoid arthritis deformities of the fingers and describe
    their joint parameters.
  answer: 1) Swan-neck deformity (hyperextension of the PIP joint with flexion of
    the DIP joint) and 2) Boutonniere deformity (flexion of the PIP joint with hyperextension
    of the DIP joint).
  keyPoints: Swan-neck (PIP hyperextended, DIP flexed) vs Boutonniere (PIP flexed,
    DIP hyperextended).
  clinicalImportance: Requires specialized splinting and gentle joint mobilization
    to preserve hand function.
- id: viva_anat_ch13_007
  question: Describe the movements of the thumb and the planes in which they occur.
  answer: Flexion and extension occur in the coronal plane parallel to the palm. Abduction
    and adduction occur in the sagittal plane perpendicular to the palm. Opposition
    is a combination of abduction, flexion, medial rotation, and adduction.
  keyPoints: Flexion/extension in coronal plane, abduction/adduction in sagittal plane,
    opposition.
  clinicalImportance: Helps therapists evaluate selective thumb motor losses after
    median or ulnar nerve injuries.
- id: viva_anat_ch13_008
  question: What tissue structure limits hyperextension of the metacarpophalangeal
    (MCP) and interphalangeal (IP) joints?
  answer: The Palmar Ligaments (or Palmar Plates). These are thick, dense fibrocartilaginous
    structures reinforcing the anterior aspect of each joint capsule.
  keyPoints: Palmar plates, fibrocartilage, resists hyperextension.
  clinicalImportance: Dislocation of these joints can tear the palmar plate, requiring
    splinting in light flexion.
- id: viva_anat_ch13_009
  question: What carpal bone coordinates the movement of the wrist and is most commonly
    dislocated?
  answer: The Lunate bone. It is the central bone of the proximal carpal row. During
    a fall on an outstretched hand, the lunate can be displaced anteriorly into the
    carpal tunnel.
  keyPoints: Lunate, proximal row center, anterior dislocation.
  clinicalImportance: Anterior lunate dislocation can compress the median nerve inside
    the carpal tunnel, requiring urgent reduction.
- id: viva_anat_ch13_010
  question: Explain the role of the Articular Disc (TFCC) at the wrist joint.
  answer: The triangular fibrocartilage complex (TFCC) disc acts as a shock-absorber
    for the medial wrist, binds the distal radius and ulna together, and prevents
    the ulna from articulating directly with the triquetrum bone.
  keyPoints: TFCC disc, binds radius-ulna, excludes ulna from wrist joint.
  clinicalImportance: TFCC tears cause painful clicking and loss of ulnar-side wrist
    stabilization.
