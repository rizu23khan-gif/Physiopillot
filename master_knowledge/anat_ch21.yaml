theory:
  definitions:
  - 'Chapter Overview: This chapter is dedicated to the structure, borders, surfaces,
    internal chambers, and vascular supply of the heart and its protective pericardium.'
  - 'Pericardium: A double-walled fibroserous sac that encloses the heart and the
    roots of the great vessels.'
  - 'The Heart: The muscular organ that pumps blood through the cardiovascular system,
    featuring four chambers and distinct surface markings.'
  coreConcepts:
  - 'Pericardium Layers: Comprises an outer fibrous pericardium and an inner serous
    pericardium (divided into parietal and visceral/epicardium layers).'
  - 'Chambers and Borders: Features the right atrium (receives deoxygenated blood
    from SVC/IVC), right ventricle (pumps to pulmonary trunk), left atrium (receives
    oxygenated blood from pulmonary veins), and left ventricle (thickest walls, pumps
    to aorta).'
  - 'Blood Supply: Coronary arteries (left and right) arise from the ascending aorta
    and run in the sulci. Venous drainage is handled primarily by the coronary sinus.'
  equipment:
  - Heart anatomy model
  - ECG electrode positioning reference
  - Stethoscope for cardiac auscultation checkpoints
clinicalCorrelations:
  pearls:
  - 'Cardiac Tamponade: Accumulation of fluid or blood in the pericardial cavity compresses
    the heart, severely restricting venous return and cardiac output.'
  - 'Apex beat: Palped in the left 5th intercostal space, roughly 9 cm from the midsternal
    line, indicating the apex of the left ventricle.'
