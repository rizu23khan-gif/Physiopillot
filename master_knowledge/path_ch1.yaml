theory:
  definitions:
  - 'Aims and Objectives of Pathology: Pathology is the scientific study of disease,
    focusing on the structural and functional changes in cells, tissues, and organs
    that underlie disease processes. It bridges basic science and clinical practice
    by explaining the ''why'' and ''how'' of signs and symptoms.'
  - 'Disease: A physiological or psychological dysfunction; an abnormal state where
    homeostatic mechanisms fail, leading to recognizable clinical signs and symptoms.'
  - 'Etiology: The study of the cause of a disease. It can be genetic (e.g., mutations)
    or acquired (e.g., infectious, nutritional, chemical, physical agents).'
  - 'Pathogenesis: The sequence of cellular, biochemical, and molecular events that
    follow the exposure of cells or tissues to an injurious agent, leading to the
    development of disease.'
  - 'Amyloidosis: A group of metabolic disorders characterized by abnormal extracellular
    tissue deposition of insoluble, misfolded amyloid proteins in various organs,
    disrupting their normal structure and function.'
  coreConcepts:
  - 'Causes of Cell Injury: 1) Hypoxia and Ischemia (most common). 2) Physical agents
    (trauma, heat, cold, radiation). 3) Chemical agents and drugs. 4) Infectious agents.
    5) Immunologic reactions. 6) Genetic derangements. 7) Nutritional imbalances.'
  - 'Hypoxia and Ischemia: Hypoxia is oxygen deficiency, leading to reduced aerobic
    oxidative respiration. Ischemia is loss of blood supply (arterial flow or venous
    drainage), which is the most common and severe cause of hypoxia because it compromises
    both oxygen and metabolic substrate delivery.'
  - 'Free Radical Injury: Cellular damage caused by highly reactive, unstable chemical
    species with an unpaired electron (Reactive Oxygen Species/ROS). They damage lipid
    membranes (lipid peroxidation), proteins (misfolding/breakdown), and DNA (mutations).'
  - 'Ischemia-Reperfusion Injury: Restoration of blood flow to ischemic tissues can
    paradoxically exacerbate cell injury and cell death. Caused by a massive influx
    of calcium, generation of fresh ROS from damaged mitochondria, and an influx of
    inflammatory leukocytes.'
  - 'Cellular Adaptations: Reversible changes in cell size, number, phenotype, metabolic
    activity, or function in response to changes in their environment. Types: 1) Atrophy:
    Shrinkage in cell size. 2) Hypertrophy: Increase in cell size. 3) Hyperplasia:
    Increase in cell number. 4) Metaplasia: Reversible replacement of one adult cell
    type by another.'
  - 'Intracellular Accumulations: Abnormal accumulation of substances inside cells
    due to metabolic derangements. Includes lipids (steatosis/fatty change), proteins,
    glycogen, and pigments (lipofuscin, melanin, hemosiderin).'
  - 'Pathologic Calcification: Abnormal tissue deposition of calcium salts. 1) Dystrophic:
    Deposition in dead or dying tissues with normal serum calcium levels (e.g., atherosclerotic
    plaques). 2) Metastatic: Deposition in normal tissues due to hypercalcemia (e.g.,
    hyperparathyroidism).'
  - 'Reversible Cell Injury: Early or mild stages of injury where the functional and
    morphologic changes are reversible if the damaging stimulus is removed. Hallmarks:
    Cellular swelling (hydropic change) due to failure of energy-dependent ion pumps,
    and fatty change.'
  - 'Irreversible Cell Injury: Point of no return leading to cell death. Characterized
    by profound disturbances in membrane function (plasma and lysosomal membranes)
    and massive mitochondrial dysfunction (loss of ATP generation).'
  - 'Necrosis: The spectrum of morphologic changes that follow cell death in living
    tissue, largely resulting from the progressive degradative action of enzymes on
    the lethally injured cell. Always pathological, accompanied by inflammation. Types:
    Coagulative, Liquefactive, Caseous, Fat, Fibrinoid.'
  - 'Apoptosis: A pathway of programmed cell death induced by a tightly regulated
    suicide program. Cells activate endogenous enzymes that degrade their own nuclear
    DNA and proteins. Plasma membrane remains intact. Can be physiological or pathological.
    No inflammation.'
  - 'Gangrene: Not a specific pattern of cell death, but a clinical term applied to
    a limb (usually lower leg) that has lost its blood supply and undergone coagulative
    necrosis involving multiple tissue planes (Dry Gangrene). If bacterial infection
    supervenes, liquefactive necrosis ensues (Wet Gangrene).'
  - 'Wallerian Degeneration: A process of anterograde degeneration of the axon and
    myelin sheath distal to the site of axonal injury. Essential concept for peripheral
    nerve injury and regeneration.'
  - 'Amyloid Protein Characteristics and Classification: Amyloid proteins are misfolded
    extracellular fibrillar deposits composed of non-branching beta-pleated sheet
    structures. They are classified into: 1) Primary Amyloidosis (AL): Caused by monoclonal
    immunoglobulin light chains secreted by clonal plasma cells (e.g., in multiple
    myeloma). 2) Secondary Amyloidosis (AA): Caused by serum amyloid A protein, an
    acute-phase reactant associated with chronic inflammatory conditions (e.g., rheumatoid
    arthritis, tuberculosis, osteomyelitis). 3) Localized Amyloidosis: Confined to
    a single organ (e.g., amyloid-beta in Alzheimer''s disease). 4) Systemic Amyloidosis:
    Involving multiple organs throughout the body.'
  - 'Diagnosis and Organ Involvement of Amyloidosis: Diagnosis is established histologically
    by Congo Red staining, which demonstrates characteristic apple-green birefringence
    under polarized light. Major organs involved include: 1) Kidneys: Leading to proteinuria
    and nephrotic syndrome. 2) Heart: Causing restrictive cardiomyopathy, conduction
    blocks, and arrhythmias. 3) Liver: Resulting in hepatomegaly. 4) Peripheral Nerves:
    Causing sensory, motor, or autonomic neuropathy.'
  - 'Physiotherapy Relevance and Precautions in Amyloidosis: Patients with amyloidosis
    present unique clinical challenges for physical therapy: 1) Peripheral Neuropathy:
    Sensory loss increases risk of neuropathic ulcers and demands meticulous foot/skin
    care, while motor weakness necessitates balance training and orthotics. 2) Fatigue:
    Profound fatigue is common due to systemic organ involvement and chronic inflammation.
    3) Cardiomyopathy Precautions: Restrictive cardiomyopathy limits cardiac output;
    therapists must strictly monitor vitals, avoid high-intensity exertion, and use
    RPE scales instead of target heart rates. 4) Exercise Tolerance: Gentle, progressive
    low-intensity aerobic and functional exercises are indicated to preserve mobility
    while preventing overexertion.'
