mcqs:
- id: mcq_path_ch1_001
  question: Which of the following cellular adaptations is characterized by an increase
    in the NUMBER of cells in an organ or tissue?
  options:
  - Hypertrophy
  - Hyperplasia
  - Atrophy
  - Metaplasia
  answer: Hyperplasia
  explanation: Hyperplasia refers to an increase in the number of cells, whereas hypertrophy
    refers to an increase in the size of individual cells.
- id: mcq_path_ch1_002
  question: 'The transformation of ciliated columnar epithelium to squamous epithelium
    in the respiratory tract of a chronic smoker is an example of:'
  options:
  - Dysplasia
  - Hyperplasia
  - Metaplasia
  - Anaplasia
  answer: Metaplasia
  explanation: Metaplasia is a reversible change in which one adult cell type is replaced
    by another adult cell type, often to withstand a harsh environment, such as the
    respiratory tract adapting to cigarette smoke.
- id: mcq_path_ch1_003
  question: Which type of necrosis is typically seen in an acute myocardial infarction
    (heart attack)?
  options:
  - Liquefactive necrosis
  - Coagulative necrosis
  - Caseous necrosis
  - Fat necrosis
  answer: Coagulative necrosis
  explanation: Coagulative necrosis is the characteristic pattern of cell death in
    hypoxic/ischemic death of cells in all solid organs except the brain.
- id: mcq_path_ch1_004
  question: 'A patient with hyperparathyroidism develops high serum calcium levels,
    leading to calcium deposition in the kidneys and lungs. This is an example of:'
  options:
  - Dystrophic calcification
  - Metastatic calcification
  - Intracellular accumulation
  - Amyloidosis
  answer: Metastatic calcification
  explanation: Metastatic calcification occurs when calcium deposits in normal tissues
    as a result of hypercalcemia. Dystrophic calcification occurs in dead/dying tissues
    with normal serum calcium.
- id: mcq_path_ch1_005
  question: Which mechanism is responsible for the rapid damage seen in Ischemia-Reperfusion
    injury?
  options:
  - Immediate apoptosis of healthy cells
  - Generation of Reactive Oxygen Species (ROS)
  - Metaplastic transformation
  - Decreased intracellular calcium
  answer: Generation of Reactive Oxygen Species (ROS)
  explanation: Restoring blood flow brings oxygen back to damaged mitochondria, which
    rapidly generate Reactive Oxygen Species (ROS), causing further membrane and DNA
    damage.
- id: mcq_path_ch1_006
  question: In Wallerian degeneration, which part of the neuron undergoes degeneration?
  options:
  - The cell body
  - The dendrites
  - The axon distal to the injury site
  - The axon proximal to the injury site
  answer: The axon distal to the injury site
  explanation: Wallerian degeneration is the active process of degeneration that occurs
    in the axon and its myelin sheath distal to the site of a nerve lesion.
- id: mcq_path_ch1_007
  question: 'Disuse atrophy, commonly seen by physiotherapists in patients with limbs
    immobilized in casts, is primarily caused by:'
  options:
  - Loss of endocrine stimulation
  - Inadequate nutrition
  - Decreased workload
  - Loss of innervation
  answer: Decreased workload
  explanation: Disuse atrophy occurs due to a decreased workload on the muscle. Early
    mobilization and exercise help reverse or prevent this condition.
- id: mcq_path_ch1_008
  question: Which of the following histopathological staining characteristics is diagnostic
    for amyloidosis under polarized light microscopy?
  options:
  - Prussian Blue staining showing dark blue granules
  - Congo Red staining showing apple-green birefringence
  - Periodic Acid-Schiff (PAS) staining showing magenta-colored glycogen
  - Sudan Black staining showing dark lipid droplets
  answer: Congo Red staining showing apple-green birefringence
  explanation: Amyloid fibrils have a beta-pleated sheet conformation that binds Congo
    Red dye, producing a characteristic apple-green birefringence when viewed under
    polarized light.
viva:
- id: viva_path_ch1_001
  question: Define Pathology and state its main subdivisions.
  answer: Pathology is the scientific study of disease, studying structural and functional
    changes in cells and tissues. Subdivisions include General Pathology (basic reactions
    of cells/tissues to abnormal stimuli) and Systemic Pathology (specific responses
    of specialized organs).
  keyPoints: General vs. Systemic pathology, study of structural/functional changes.
  clinicalImportance: ''
- id: viva_path_ch1_002
  question: Distinguish between Etiology and Pathogenesis.
  answer: Etiology refers to the underlying causes of a disease (e.g., genetic, acquired
    like bacteria or chemicals). Pathogenesis is the mechanism or sequence of events
    from the initial stimulus to the ultimate expression of the disease.
  keyPoints: Etiology = Cause; Pathogenesis = Mechanism/Sequence of events.
  clinicalImportance: ''
- id: viva_path_ch1_003
  question: What is the difference between Hypoxia and Ischemia? Which is more damaging
    and why?
  answer: Hypoxia is a deficiency of oxygen. Ischemia is a reduction in blood flow.
    Ischemia is more rapidly and severely damaging than hypoxia alone because it not
    only deprives tissues of oxygen but also blocks the delivery of metabolic substrates
    (glucose) and the removal of toxic waste products.
  keyPoints: Ischemia includes loss of substrates and waste removal, not just oxygen.
  clinicalImportance: ''
- id: viva_path_ch1_004
  question: List the four main types of cellular adaptations and define one.
  answer: Atrophy (shrinkage in cell size), Hypertrophy (increase in cell size), Hyperplasia
    (increase in cell number), Metaplasia (reversible change from one adult cell type
    to another).
  keyPoints: Size (atrophy/hypertrophy), number (hyperplasia), type (metaplasia).
  clinicalImportance: ''
- id: viva_path_ch1_005
  question: Differentiate between Dystrophic and Metastatic calcification.
  answer: Dystrophic calcification occurs in dead, dying, or degenerating tissues
    despite normal serum calcium levels (e.g., calcified heart valves). Metastatic
    calcification occurs in normal, viable tissues as a result of hypercalcemia (high
    serum calcium levels, e.g., hyperparathyroidism).
  keyPoints: Dystrophic = dead tissue + normal calcium; Metastatic = normal tissue
    + high calcium.
  clinicalImportance: ''
- id: viva_path_ch1_006
  question: Compare Coagulative and Liquefactive necrosis.
  answer: Coagulative necrosis is caused by severe ischemia (except in the brain);
    tissue architecture is preserved for a few days (ghost cells). Liquefactive necrosis
    occurs in the brain (due to hypoxia) and in localized bacterial infections (abscesses);
    tissue is completely digested into a liquid viscous mass.
  keyPoints: Coagulative = preserved architecture/ischemia; Liquefactive = digested
    tissue/brain/bacterial.
  clinicalImportance: ''
- id: viva_path_ch1_007
  question: What is Apoptosis, and how does it differ from Necrosis?
  answer: Apoptosis is programmed, ATP-dependent cell death affecting single cells
    without an inflammatory response. Necrosis is accidental, pathological cell death
    affecting groups of cells, characterized by cell swelling, membrane rupture, and
    a prominent inflammatory response.
  keyPoints: Programmed vs Accidental, Single vs Group, No inflammation vs Inflammation.
  clinicalImportance: ''
- id: viva_path_ch1_008
  question: Describe Wallerian Degeneration and its significance to physiotherapists.
  answer: It is the degeneration of the axon and myelin sheath distal to the site
    of a peripheral nerve injury. It is significant because the target muscle is denervated
    and prone to atrophy. Physiotherapists must use electrical stimulation and passive
    movements to maintain muscle tone and joint mobility until the nerve regenerates
    (about 1mm/day).
  keyPoints: Distal axon/myelin degeneration, 1mm/day regeneration, prevention of
    denervation atrophy.
  clinicalImportance: ''
- id: viva_path_ch1_009
  question: What is Ischemia-Reperfusion injury?
  answer: It is the paradoxical exacerbation of cell injury and cell death that occurs
    when blood flow is restored to ischemic tissues. It is caused by a massive influx
    of calcium, generation of reactive oxygen species (ROS) from damaged mitochondria,
    and influx of inflammatory cells.
  keyPoints: Paradoxical injury upon blood flow restoration, ROS, calcium influx.
  clinicalImportance: ''
- id: viva_path_ch1_010
  question: Describe Amyloidosis, its diagnosis, and the critical precautions a physiotherapist
    must implement.
  answer: Amyloidosis is a group of metabolic disorders characterized by the extracellular
    deposition of insoluble, misfolded amyloid proteins (beta-pleated sheets) in organs.
    Histopathologically, it is diagnosed using Congo Red staining, showing apple-green
    birefringence under polarized light. For a physiotherapist, critical precautions
    include strictly monitoring vitals and using the Borg RPE scale during exercise
    due to restrictive cardiomyopathy risk, managing balance/foot care for peripheral
    neuropathy, and pacing therapy to manage systemic fatigue.
  keyPoints: Insoluble misfolded proteins, beta-pleated sheets, Congo Red staining,
    apple-green birefringence, restrictive cardiomyopathy precautions, vitals monitoring,
    neuropathy foot care, energy conservation.
  clinicalImportance: Prevents cardiovascular complications, syncope, and falls in
    patients with multi-organ systemic amyloid involvement.
