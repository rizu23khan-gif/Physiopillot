clinicalCorrelations:
  pearls:
  - 'Clinical Relevance of Atrophy: Immobilization of a limb in a cast or prolonged
    bed rest leads to disuse atrophy of skeletal muscles. Physiotherapists combat
    this through early mobilization, active/passive range of motion, and electrical
    muscle stimulation.'
  - 'Clinical Relevance of Ischemia: Ischemic heart disease or peripheral arterial
    disease severely limits oxygen supply. Physiotherapists must monitor vital signs
    and prescribe aerobic conditioning carefully to improve collateral circulation
    without inducing ischemic events.'
  - 'Clinical Relevance of Wallerian Degeneration: Following a peripheral nerve crush
    or severing injury (e.g., Erb''s palsy, sciatica), Wallerian degeneration occurs
    distal to the lesion. Physiotherapists use electrical stimulation (e.g., IGal)
    to maintain muscle viability while awaiting slow axonal regeneration (1 mm/day).'
  - 'Hypertrophy in Physiotherapy: Resistance training (e.g., lifting weights) induces
    physiological hypertrophy of skeletal muscle fibers due to increased demand, highlighting
    the body''s adaptive capacity.'
  - 'Gangrene and Diabetic Foot: Diabetic patients are prone to vascular occlusion
    and neuropathy, leading to wet gangrene of the foot. Physiotherapists emphasize
    foot care, proper footwear, and neuropathic screening to prevent minor injuries
    from escalating to amputations.'
  - 'Physiotherapy Management in Amyloidosis: When treating patients with cardiac
    amyloidosis, therapists must maintain a high index of suspicion for orthostatic
    hypotension due to autonomic neuropathy and restrictive cardiomyopathy. Avoid
    rapid positional transitions (e.g., supine to standing), encourage ankle pumps
    prior to rising, and terminate exercise immediately if dizziness, chest discomfort,
    or abnormal blood pressure fluctuations occur.'
