theory:
  definitions:
  - 'Chapter Overview: This chapter details the pleural membranes (visceral and parietal),
    pleural cavities, and the recesses of the pleura.'
  - 'Definition of Pleura: A serous membrane lined by simple squamous epithelium (mesothelium)
    that envelopes each lung.'
  - 'Pleural Cavity: The potential space between the visceral pleura (covering the
    lung surface) and the parietal pleura (lining the cavity walls).'
  coreConcepts:
  - 'Parietal Pleura Divisions: Classified into cervical (cupula), costal, diaphragmatic,
    and mediastinal pleura based on the structures it lines.'
  - 'Visceral Pleura: Adheres closely to all surfaces of the lung, including the interlobar
    fissures. It receives its blood supply from bronchial vessels.'
  - 'Pleural Recesses: Important potential spaces that allow for lung expansion during
    deep inspiration: include the costodiaphragmatic recess (largest, clinically significant)
    and costomediastinal recess.'
  equipment:
  - Thorax cross-section model
  - Aspiration syringes (simulated thoracocentesis gear)
  - Pleural cavity diagrams
clinicalCorrelations:
  pearls:
  - 'Pneumothorax: Presence of air in the pleural cavity, which can cause lung collapse.'
  - 'Pleural Effusion: Accumulation of excess fluid in the pleural cavity, typically
    pooling first in the costodiaphragmatic recesses.'
