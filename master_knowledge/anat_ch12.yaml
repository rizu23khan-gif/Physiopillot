theory:
  definitions:
  - 'Hand (Manus): The terminal, highly mobile, and tactile portion of the upper limb,
    designed for grasping, manipulation, and delicate sensory feedback. Anatomically
    structured into the carpus (wrist containing 8 package-arranged carpal bones),
    metacarpus (palm containing 5 metacarpal bones), and digits (containing 14 phalanges).'
  - Supported by a complex coordinate assembly of 20 intrinsic muscles, extensive
    tendon sheaths, fascial compartments, and protective structures including the
    fibrous palmar aponeurosis and the high-strength flexor retinaculum.
  coreConcepts:
  - 'Palmar Aponeurosis: A dense, triangular thickening of the deep fascia of the
    palm. Its apex is continuous with the palmaris longus tendon, and its broad base
    divides into four digital slips that fuse with fibrous flexor sheaths. It protects
    underlying nerves and vessels and secures the skin to improve grip stability.'
  - 'Carpal Tunnel and Flexor Retinaculum: The flexor retinaculum (transverse carpal
    ligament) is a tough fibrous band that bridges the anterior concavity of the carpus,
    converting it into an osteofibrous tunnel (Carpal Tunnel). The tunnel transmits
    9 tendons (4 of Flexor Digitorum Superficialis, 4 of Flexor Digitorum Profundus,
    and 1 of Flexor Pollicis Longus) and the Median Nerve.'
  - 'Thenar and Hypothenar Intrinsic Compartments: Thenar muscles (Abductor Pollicis
    Brevis, Flexor Pollicis Brevis, Opponens Pollicis) dominate the thumb base, innervated
    by the Median Nerve. Hypothenar muscles (Abductor Digiti Minimi, Flexor Digiti
    Minimi Brevis, Opponens Digiti Minimi) dominate the little finger base, innervated
    by the deep branch of the Ulnar Nerve.'
  - 'Hand Lumbricals and Interossei: Lumbricals (four small worm-like muscles arising
    from Flexor Digitorum Profundus tendons) flex the metcarpophalangeal (MCP) joints
    and extend the interphalangeal (IP) joints. Interossei occupy the intermetacarpal
    spaces: Palmar Interossei (3 or 4) adduct the fingers towards the middle finger,
    while Dorsal Interossei (4) abduct the fingers away.'
  equipment:
  - Palmar Aponeurosis (Shields palmar arches, nerves, and vessels)
  - Flexor Retinaculum (High-strength anchor forming carpal tunnel roof)
  - Thenar Compartment (Controls base-of-thumb positioning and opposition)
  - Hypothenar Compartment (Enables cupping and control of fifth digit)
  - Lumbrical Muscles (Unique tendon-to-tendon muscles for coordinate grasp)
  - Palmar Interossei (Adduction motors of digits, innervated by ulnar nerve)
  - Dorsal Interossei (Abduction motors of digits, innervated by ulnar nerve)
  - Fascial Spaces of Palm (Thenar, midpalmar, and pulp spaces of digits)
clinicalCorrelations:
  pearls:
  - 'Carpal Tunnel Syndrome (CTS): Any swelling or inflammation of the tendon sheaths
    within the carpal tunnel compromises containing space, compressing the Median
    Nerve. This causes motor wasting of the thenar muscles (ape hand) and sensory
    paresthesia (tingling/numbness) in the lateral three and a half digits (thumb,
    index, middle, and radial half of ring finger).'
  - 'Dupuytren''s Contracture: A progressive, localized fibrosing hyper-proliferation
    of the palmar aponeurosis. It leads to shortening and thickening of the digital
    bands, most commonly pulling the 4th (ring) and 5th (little) fingers into permanent,
    rigid flexion contracture.'
  - 'Pulp Space Infections (Whitlow / Felon): The distal pulp workspace of the fingers
    is partitioned into multiple closed compartment cells by dense fibrous septa running
    from skin to periosteum. Infection in this closed space build rapid interstitial
    pressures and can cause distal phalangeal bone necrosis due to localized bone
    ischemia.'
