mcqs:
- id: mcq_anat_ch32_001
  question: Which bone forms the posterior floor of the cranial cavity?
  options:
  - Occipital
  - Sphenoid
  - Temporal
  - Frontal
  answer: Occipital
  explanation: The occipital bone forms the base of the skull posteriorly and houses
    the posterior cranial fossa.
