    parameters:
      Cranial Bones Count: 8 bones (Frontal, Parietal (2), Temporal (2), Occipital,
        Sphenoid, Ethmoid)
      Facial Bones Count: 14 bones (Nasal, Lacrimal, Palatine, Inferior nasal concha,
        Vomer, Maxilla, Zygomatic, Mandible)
      Critical Sutures: Fibrous joint articulations that fuse with age
