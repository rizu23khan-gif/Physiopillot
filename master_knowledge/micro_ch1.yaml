subjectExtensions:
  anatomy:
    parameters:
      Gram Stain primary timing: Apply Crystal Violet for 1 minute; rinse gently with
        water.
      Gram Stain mordant timing: Apply Gram's Iodine for 1 minute; rinse gently with
        water.
      Gram Stain decolorizer timing: Apply Acetone-Alcohol for 10-20 seconds; rinse
        immediately with water.
      Gram Stain counterstain timing: Apply Safranin for 30-60 seconds; rinse and
        air dry.
      Acid-Fast decoluration strength: 20% Sulfuric Acid for Mycobacterium tuberculosis
        (5% for M. leprae, 1% for Nocardia).
      Autoclave standard parameters: 121°C (250°F) at 15 psi steam pressure for a
        minimum of 15 minutes.
      Hot Air Oven dry heat sterilization: 160°C (320°F) for 2 hours or 170°C (340°F)
        for 1 hour.
