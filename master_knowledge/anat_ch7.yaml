mcqs:
- id: mcq_anat_ch7_001
  question: Which joint functionally acts as a ball-and-socket, but structurally is
    a saddle joint?
  options:
  - Acromioclavicular joint
  - Glenohumeral joint
  - Sternoclavicular joint
  - Scapulothoracic joint
  answer: Sternoclavicular joint
  explanation: The SC joint relies on a fibrocartilaginous disc to absorb shock and
    permit multi-axial motions mimicking a ball-and-socket.
- id: mcq_anat_ch7_002
  question: What is the physiological ratio of glenohumeral to scapulothoracic movement
    during normal forceful arm elevation above 30 degrees?
  options:
  - '1:1'
  - '1:2'
  - '2:1'
  - '3:1'
  answer: '2:1'
  explanation: Out of every 3 degrees of motion during elevation, 2 degrees occur
    at the GH joint and 1 degree at the ST articulation.
- id: mcq_anat_ch7_003
  question: 'Avulsion of the anterior-inferior glenoid labrum is clinically termed:'
  options:
  - SLAP tear
  - Bankart lesion
  - Hill-Sachs lesion
  - Rotator cuff tear
  answer: Bankart lesion
  explanation: Bankart lesions frequently occur secondary to anterior glenohumeral
    dislocations.
- id: mcq_anat_ch7_004
  question: Which of the following structures lies in the subacromial space and is
    most susceptible to impingement?
  options:
  - Coracohumeral ligament
  - Supraspinatus tendon
  - Subscapularis tendon
  - Short head of biceps
  answer: Supraspinatus tendon
  explanation: The supraspinatus tendon passes directly under the rigid coracoacromial
    arch.
- id: mcq_anat_ch7_005
  question: Which nerve is intimately related to the surgical neck of the humerus
    and is frequently at risk in anterior shoulder dislocations?
  options:
  - Radial nerve
  - Axillary nerve
  - Musculocutaneous nerve
  - Suprascapular nerve
  answer: Axillary nerve
  explanation: The axillary nerve encircles the surgical neck in the quadrangular
    space, exposing it to stretch injury.
- id: mcq_anat_ch7_006
  question: The conoid ligament attaches to which bone?
  options:
  - Acromion
  - Coracoid process
  - Clavicle
  - Spine of scapula
  answer: Clavicle
  explanation: It attaches from the base of the coracoid process up to the conoid
    tubercle on the inferior surface of the clavicle.
- id: mcq_anat_ch7_007
  question: 'The primary dynamic stabilisers of the glenohumeral joint are the:'
  options:
  - Deltoid and Pectoralis major
  - Rotator cuff muscles
  - Glenohumeral ligaments
  - Glenoid labrum
  answer: Rotator cuff muscles
  explanation: The SITS muscles provide joint compression and active control throughout
    the range of motion.
- id: mcq_anat_ch7_008
  question: 'The subscapular bursa typically communicates directly with:'
  options:
  - Subacromial bursa
  - Subdeltoid bursa
  - Glenohumeral joint cavity
  - Acromioclavicular joint
  answer: Glenohumeral joint cavity
  explanation: It acts as a synovial extension that protects the subscapularis tendon
    as it passes over the neck of the scapula.
- id: mcq_anat_ch7_009
  question: Which muscle initiates shoulder abduction from 0 to 15 degrees?
  options:
  - Middle deltoid
  - Supraspinatus
  - Infraspinatus
  - Serratus anterior
  answer: Supraspinatus
  explanation: The supraspinatus establishes the initial rotational moment before
    the deltoid gains a favorable mechanical advantage.
- id: mcq_anat_ch7_010
  question: 'Adhesive capsulitis (frozen shoulder) primarily involves fibrous contracture
    of the:'
  options:
  - Superior capsule
  - Axillary recess
  - Bicipital groove
  - Coracoacromial ligament
  answer: Axillary recess
  explanation: The redundant inferior capsular fold becomes fibrosed, severely restricting
    external rotation and elevation.
- id: mcq_anat_ch7_011
  question: 'Winged scapula is caused by paralysis of the:'
  options:
  - Trapezius
  - Rhomboid major
  - Serratus anterior
  - Latissimus dorsi
  answer: Serratus anterior
  explanation: Loss of serratus anterior function prevents the scapula from remaining
    anchored to the posterior thoracic wall during pushing.
- id: mcq_anat_ch7_012
  question: Which nerve supplies the serratus anterior muscle?
  options:
  - Dorsal scapular nerve
  - Thoracodorsal nerve
  - Long thoracic nerve
  - Axillary nerve
  answer: Long thoracic nerve
  explanation: It arises from roots C5, C6, C7 and courses down the lateral thoracic
    wall.
- id: mcq_anat_ch7_013
  question: 'A Hill-Sachs lesion is a structural defect on the:'
  options:
  - Anterior glenoid rim
  - Posterolateral humeral head
  - Anteromedial humeral head
  - Superior glenoid tubercle
  answer: Posterolateral humeral head
  explanation: It's an impaction fracture caused by the hard anterior glenoid rim
    striking the back of the humerus during dislocation.
- id: mcq_anat_ch7_014
  question: 'The ''painful arc'' sign (pain between 60-120 degrees of abduction) is
    indicative of:'
  options:
  - Acromioclavicular osteoarthritis
  - Adhesive capsulitis
  - Subacromial impingement
  - Glenohumeral instability
  answer: Subacromial impingement
  explanation: At this mid-range, the supraspinatus tendon is severely compressed
    beneath the acromion against the greater tuberosity.
- id: mcq_anat_ch7_015
  question: Which ligament roofs the bicipital groove, holding the long head of the
    biceps in place?
  options:
  - Coracohumeral ligament
  - Transverse humeral ligament
  - Glenohumeral ligament
  - Coracoacromial ligament
  answer: Transverse humeral ligament
  explanation: It spans between the greater and lesser tubercles, trapping the tendon
    securely within the sulcus.
- id: mcq_anat_ch7_016
  question: Which motion is an essential coupled movement required to fully abduct
    the arm past 90 degrees?
  options:
  - Internal rotation of the humerus
  - External rotation of the humerus
  - Depression of the clavicle
  - Anterior tilting of the scapula
  answer: External rotation of the humerus
  explanation: The greater tuberosity must externally rotate to physically pass under
    the coracoacromial arch.
- id: mcq_anat_ch7_017
  question: The coracoacromial arch prevents displacement of the humeral head in which
    direction?
  options:
  - Anterior
  - Posterior
  - Superior
  - Inferior
  answer: Superior
  explanation: It forms a secondary rigid socket above the joint, limiting superior
    translation.
- id: mcq_anat_ch7_018
  question: Which of the following is considered a 'false' anatomical joint?
  options:
  - Sternoclavicular joint
  - Acromioclavicular joint
  - Glenohumeral joint
  - Scapulothoracic articulation
  answer: Scapulothoracic articulation
  explanation: It lacks a true synovial capsule and articulate cartilage, relying
    on muscle layers for smooth gliding.
- id: mcq_anat_ch7_019
  question: What is the primary restraint to inferior translation of the arm resting
    at the side?
  options:
  - Inferior glenohumeral ligament
  - Superior glenohumeral ligament & Coracohumeral ligament
  - Long head of biceps
  - Subscapularis
  answer: Superior glenohumeral ligament & Coracohumeral ligament
  explanation: In 0 degrees of elevation, these superior structures are tightened
    to resist gravity.
- id: mcq_anat_ch7_020
  question: 'The carrying angle is normally measured at the:'
  options:
  - Shoulder
  - Elbow
  - Wrist
  - Neck
  answer: Elbow
  explanation: This angle compensates for the wider female pelvis and ensures the
    swinging arm clears the hips.
- id: mcq_anat_ch7_021
  question: In a 'step deformity' of the shoulder, which joint is typically separated?
  options:
  - Sternoclavicular joint
  - Glenohumeral joint
  - Acromioclavicular joint
  - Scapulothoracic joint
  answer: Acromioclavicular joint
  explanation: The distal clavicle displaces superiorly when the acromion drops due
    to ruptured AC and CC ligaments.
- id: mcq_anat_ch7_022
  question: 'The robust ligament most vital for preventing medial displacement of
    the clavicle at the SC joint is the:'
  options:
  - Anterior sternoclavicular ligament
  - Interclavicular ligament
  - Costoclavicular ligament
  - Coracoclavicular ligament
  answer: Costoclavicular ligament
  explanation: It firmly tethers the medial clavicle to the first rib, absorbing massive
    transmission forces.
- id: mcq_anat_ch7_023
  question: 'The most commonly ruptured tendon of the rotator cuff occurs in the:'
  options:
  - Subscapularis
  - Infraspinatus
  - Teres minor
  - Supraspinatus
  answer: Supraspinatus
  explanation: Its presence in the narrow avascular critical zone makes it highly
    prone to degenerative tears.
- id: mcq_anat_ch7_024
  question: During arm elevation, the clavicle must undergo which critical motion
    to allow full overhead reach?
  options:
  - Anterior rotation
  - Posterior rotation
  - Inferior glide
  - Superior glide
  answer: Posterior rotation
  explanation: The clavicle rotates axially up to 50 degrees backwards, allowing full
    tension on the coracoclavicular ligaments.
- id: mcq_anat_ch7_025
  question: A complete tear of the coracoclavicular ligaments results in a grade III
    injury of which joint?
  options:
  - Glenohumeral joint
  - Sternoclavicular joint
  - Acromioclavicular joint
  - Scapulothoracic joint
  answer: Acromioclavicular joint
  explanation: Grade III AC joint sprains involve tears of both the AC and crucial
    CC ligaments.
- id: mcq_anat_ch7_026
  question: Which part of the joint capsule is weakest and least supported by the
    rotator cuff?
  options:
  - Superior
  - Posterior
  - Anterior
  - Inferior
  answer: Inferior
  explanation: The inferior aspect has no muscle reinforcement natively, predisposing
    it to anterior-inferior dislocation.
- id: mcq_anat_ch7_027
  question: The axillary nerve passes through which anatomical space?
  options:
  - Quadrangular space
  - Triangular space
  - Triangular interval
  - Suprascapular notch
  answer: Quadrangular space
  explanation: Here it travels alongside the posterior circumflex humeral artery.
- id: mcq_anat_ch7_028
  question: The suprascapular nerve supplies which two muscles?
  options:
  - Deltoid and Teres minor
  - Supraspinatus and Infraspinatus
  - Subscapularis and Teres major
  - Trapezius and Rhomboids
  answer: Supraspinatus and Infraspinatus
  explanation: It emerges from the upper trunk, passes under the transverse scapular
    ligament, and supplies both muscles.
- id: mcq_anat_ch7_029
  question: To achieve full 180 degrees of shoulder abduction, how much scapular upward
    rotation is required?
  options:
  - 30 degrees
  - 60 degrees
  - 90 degrees
  - 120 degrees
  answer: 60 degrees
  explanation: Based on the 2:1 scapulohumeral rhythm, 120 degrees occur at the GH
    joint and 60 at the ST joint.
- id: mcq_anat_ch7_030
  question: 'The typical capsular pattern of restriction for the glenohumeral joint
    is:'
  options:
  - Abduction > External Rotation > Internal Rotation
  - External Rotation > Abduction > Internal Rotation
  - Internal Rotation > External Rotation > Abduction
  - Flexion > Extension > Abduction
  answer: External Rotation > Abduction > Internal Rotation
  explanation: This specific sequence of progressive restriction is the hallmark clinical
    presentation of adhesive capsulitis.
viva:
- id: viva_anat_ch7_001
  question: What type of joint is the sternoclavicular joint?
  answer: Structurally it is a saddle joint, but biomechanically it functions as a
    multi-axial ball-and-socket joint.
  keyPoints: Saddle vs ball-and-socket.
  clinicalImportance: Explains the extensive mobility of the clavicle.
- id: viva_anat_ch7_002
  question: What is the function of the articular disc in the SC joint?
  answer: Acts as a shock absorber and prevents upward/medial displacement of the
    clavicle over the sternum.
  keyPoints: Prevents medial displacement.
  clinicalImportance: Essential for SC joint stability against axial loading.
- id: viva_anat_ch7_003
  question: Name the two parts of the coracoclavicular ligament.
  answer: The conoid ligament (posteromedial) and the trapezoid ligament (anterolateral).
  keyPoints: Conoid is medial, trapezoid is lateral.
  clinicalImportance: Primary weight-bearing suspensory ligament; injured in AC separation.
- id: viva_anat_ch7_004
  question: What is scapulohumeral rhythm?
  answer: The coordinated movement between the glenohumeral and scapulothoracic joints
    during arm elevation. After 30 degrees of abduction, there is a 2:1 ratio of glenohumeral
    to scapulothoracic movement.
  keyPoints: 2:1 ratio (2 degrees GH to 1 degree ST).
  clinicalImportance: Altered rhythm indicates shoulder pathology like adhesive capsulitis.
- id: viva_anat_ch7_005
  question: Why does the humerus externally rotate during shoulder abduction?
  answer: To clear the greater tuberosity from under the rigid coracoacromial arch.
  keyPoints: Prevents impingement.
  clinicalImportance: Lack of external rotation leads to subacromial impingement.
- id: viva_anat_ch7_006
  question: What muscles form the rotator cuff?
  answer: Supraspinatus, Infraspinatus, Teres minor, and Subscapularis (SITS).
  keyPoints: SITS muscles.
  clinicalImportance: Provide dynamic stability to the glenohumeral joint.
- id: viva_anat_ch7_007
  question: What is the primary action of the supraspinatus?
  answer: Initiates shoulder abduction for the first 15 degrees and acts as a dynamic
    stabilizer.
  keyPoints: Initiates abduction (0-15 degrees), dynamic stabilization.
  clinicalImportance: Most commonly torn rotator cuff muscle.
- id: viva_anat_ch7_008
  question: Describe the glenoid labrum.
  answer: A fibrocartilaginous rim attached to the margin of the glenoid cavity.
  keyPoints: Deepens the cavity by 50%.
  clinicalImportance: Torn in Bankart lesions during anterior dislocation.
- id: viva_anat_ch7_009
  question: What is the most common direction of shoulder dislocation?
  answer: Anterior dislocation (specifically anteroinferior).
  keyPoints: Axillary nerve at risk.
  clinicalImportance: Common traumatic injury requiring reduction and rehab.
- id: viva_anat_ch7_010
  question: What nerve is most at risk during anterior shoulder dislocation?
  answer: The axillary nerve, due to its course around the surgical neck of the humerus.
  keyPoints: Supplies deltoid and teres minor.
  clinicalImportance: Axillary nerve palsy leads to loss of shoulder contour and abduction
    weakness.
- id: viva_anat_ch7_011
  question: What is painful arc syndrome?
  answer: Pain occurring between 60-120 degrees of shoulder abduction, typical of
    subacromial impingement.
  keyPoints: 60-120 degrees.
  clinicalImportance: Classic sign of supraspinatus tendinitis or bursitis.
- id: viva_anat_ch7_012
  question: What creates the coracoacromial arch?
  answer: The coracoid process, the acromion, and the coracoacromial ligament.
  keyPoints: Forms the secondary socket.
  clinicalImportance: Prevents superior displacement of the humeral head.
- id: viva_anat_ch7_013
  question: What lies in the subacromial space?
  answer: Supraspinatus tendon, subacromial bursa, long head of biceps tendon, and
    joint capsule.
  keyPoints: Structures prone to impingement.
  clinicalImportance: Swelling of these structures causes impingement syndrome.
- id: viva_anat_ch7_014
  question: Explain the mechanics of a Bankart lesion.
  answer: An avulsion of the anterior-inferior glenoid labrum caused by an anterior
    shoulder dislocation.
  keyPoints: Anterior-inferior labrum tear.
  clinicalImportance: Primary cause of recurrent shoulder instability.
- id: viva_anat_ch7_015
  question: What is a Hill-Sachs lesion?
  answer: A cortical depression in the posterolateral head of the humerus resulting
    from forceful impact against the anterior glenoid rim during dislocation.
  keyPoints: Posterolateral humeral head fracture.
  clinicalImportance: Contributes to recurrent anterior instability.
- id: viva_anat_ch7_016
  question: Name the stabilising factors of the glenohumeral joint.
  answer: 'Dynamic: Rotator cuff muscles; Static: Articular surfaces, glenoid labrum,
    joint capsule, ligaments, negative intra-articular pressure.'
  keyPoints: Rotator cuff provides primary dynamic stability.
  clinicalImportance: Crucial for rehab focus in instability.
- id: viva_anat_ch7_017
  question: Describe the axillary recess.
  answer: The redundant inferior fold of the glenohumeral joint capsule present when
    the arm is adducted.
  keyPoints: Allows full elevation.
  clinicalImportance: Becomes obliterated/fibrosed in adhesive capsulitis.
- id: viva_anat_ch7_018
  question: What is Winged Scapula?
  answer: Prominence of the medial border of the scapula due to paralysis of the serratus
    anterior muscle.
  keyPoints: Long thoracic nerve injury.
  clinicalImportance: Impairs overhead reaching and pushing activities.
- id: viva_anat_ch7_019
  question: Trace the long head of the biceps.
  answer: Originates from the supraglenoid tubercle, passes through the joint cavity,
    and descends in the intertubercular groove.
  keyPoints: Intracapsular but extrasynovial.
  clinicalImportance: Prone to tendinitis and rupture in the groove.
- id: viva_anat_ch7_020
  question: What binds the long head of biceps in its groove?
  answer: The transverse humeral ligament.
  keyPoints: Spans greater and lesser tubercles.
  clinicalImportance: Tears lead to biceps subluxation.
- id: viva_anat_ch7_021
  question: Identify the major bursae around the shoulder.
  answer: Subacromial (subdeltoid), subscapular, and infraspinatus bursae.
  keyPoints: Subscapular communicates with the joint.
  clinicalImportance: Subacromial is most commonly inflamed (bursitis).
- id: viva_anat_ch7_022
  question: Describe the blood supply of the glenohumeral joint.
  answer: Anterior and posterior circumflex humeral arteries, and branches from the
    suprascapular artery.
  keyPoints: Rich anastomosis around surgical neck.
  clinicalImportance: Avascular necrosis of humeral head can follow proximal fractures.
- id: viva_anat_ch7_023
  question: What is the capsular pattern of the shoulder?
  answer: External rotation is most limited, followed by abduction, then internal
    rotation.
  keyPoints: ER > ABD > IR.
  clinicalImportance: Hallmark diagnostic sign of frozen shoulder (adhesive capsulitis).
- id: viva_anat_ch7_024
  question: Which structure provides primarily superior stability to the AC joint?
  answer: The superior acromioclavicular ligament, reinforced by trapezius and deltoid
    fibers.
  keyPoints: Capsule and ligament.
  clinicalImportance: First to tear in mild AC sprain.
- id: viva_anat_ch7_025
  question: How is the carrying angle influenced by shoulder width?
  answer: Compensates for the wider pelvis in females, laterally angling the forearm
    when extended.
  keyPoints: Biomechanics avoiding pelvis.
  clinicalImportance: Connects upper extremity alignment to elbow/wrist symptoms.
