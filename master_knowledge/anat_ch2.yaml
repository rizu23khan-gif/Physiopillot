mcqs:
- id: mcq_anat_ch2_001
  question: Which of the following bones is developmentally the first to start ossifying
    in the human somatic skeleton?
  options:
  - Scapula
  - Clavicle
  - Humerus
  - Femur
  answer: Clavicle
  explanation: ''
- id: mcq_anat_ch2_002
  question: The appendicular shoulder girdle anatomically consists of which of the
    following paired structures?
  options:
  - Scapula and Humerus
  - Clavicle and Sternum
  - Clavicle and Scapula
  - Sternum and Humerus
  answer: Clavicle and Scapula
  explanation: ''
- id: mcq_anat_ch2_003
  question: Which specific joint provides the solitary direct bony articulation between
    the upper limb complex and the central axial skeleton?
  options:
  - Acromioclavicular joint
  - Glenohumeral joint
  - Sternoclavicular joint
  - Coracoclavicular joint
  answer: Sternoclavicular joint
  explanation: ''
- id: mcq_anat_ch2_004
  question: Profound 'wrist drop' is a universally characteristic clinical sign of
    severe injury to which major nerve?
  options:
  - Median nerve
  - Ulnar nerve
  - Radial nerve
  - Axillary nerve
  answer: Radial nerve
  explanation: ''
- id: mcq_anat_ch2_005
  question: 'The visual ''Ape thumb'' deformity is most directly associated with a
    peripheral lesion of the:'
  options:
  - Ulnar nerve
  - Radial nerve
  - Musculocutaneous nerve
  - Median nerve
  answer: Median nerve
  explanation: ''
- id: mcq_anat_ch2_006
  question: 'A complete intrinsic ''claw hand'' deformity primarily and most commonly
    results from traumatic damage to the:'
  options:
  - Ulnar nerve
  - Median nerve
  - Radial nerve
  - Axillary nerve
  answer: Ulnar nerve
  explanation: ''
- id: mcq_anat_ch2_007
  question: Erb-Duchenne palsy involves avulsion or traction injury strictly to which
    superior roots of the brachial plexus?
  options:
  - C5, C6
  - C7, C8
  - C8, T1
  - C5, C6, C7
  answer: C5, C6
  explanation: ''
- id: mcq_anat_ch2_008
  question: Klumpke's paralysis, typically caused by hyper-abduction injuries, involves
    selective avulsion of which brachial plexus roots?
  options:
  - C5, C6
  - C8, T1
  - C7, C8
  - T1, T2
  answer: C8, T1
  explanation: ''
- id: mcq_anat_ch2_009
  question: Which superficial vein reliably runs proximally along the strictly lateral
    aspect (radial border) of the upper limb?
  options:
  - Basilic vein
  - Cephalic vein
  - Axillary vein
  - Median cubital vein
  answer: Cephalic vein
  explanation: ''
- id: mcq_anat_ch2_010
  question: Out of all eight carpal bones, which is the most statistically common
    to suffer an isolated fracture?
  options:
  - Lunate
  - Capitate
  - Scaphoid
  - Pisiform
  answer: Scaphoid
  explanation: ''
- id: mcq_anat_ch2_011
  question: Which carpal bone is the most notoriously prone to anterior dislocation?
  options:
  - Scaphoid
  - Lunate
  - Trapezium
  - Hamate
  answer: Lunate
  explanation: ''
- id: mcq_anat_ch2_012
  question: 'A classic Colles'' fracture, generating a ''dinner fork'' deformity,
    explicitly involves a fracture of the:'
  options:
  - Proximal radius
  - Distal radius
  - Distal ulna
  - Distal humerus
  answer: Distal radius
  explanation: ''
- id: mcq_anat_ch2_013
  question: '''Tennis elbow'' is a common clinical pseudonym reflecting tendinopathy
    at which anatomical site?'
  options:
  - Medial epicondyle
  - Olecranon bursa
  - Lateral epicondyle
  - Bicipital groove
  answer: Lateral epicondyle
  explanation: ''
- id: mcq_anat_ch2_014
  question: '''Golfer''s elbow'' selectively affects the common tendinous origin point
    for which functional muscle group?'
  options:
  - Wrist extensors
  - Wrist flexors
  - Shoulder abductors
  - Elbow pronators
  answer: Wrist flexors
  explanation: ''
- id: mcq_anat_ch2_015
  question: Because of its powerful protraction action critical in forward pushing,
    which muscle is commonly termed the 'boxer's muscle'?
  options:
  - Pectoralis major
  - Latissimus dorsi
  - Deltoid
  - Serratus anterior
  answer: Serratus anterior
  explanation: ''
- id: mcq_anat_ch2_016
  question: 'Prominent ''winging of the scapula'' against the thoracic wall is directly
    caused by nerve paralysis of the:'
  options:
  - Rhomboid major
  - Trapezius
  - Serratus anterior
  - Levator scapulae
  answer: Serratus anterior
  explanation: ''
- id: mcq_anat_ch2_017
  question: Which major nerve is easily palpable as it passes directly behind the
    medial epicondyle of the humerus?
  options:
  - Median nerve
  - Radial nerve
  - Ulnar nerve
  - Musculocutaneous nerve
  answer: Ulnar nerve
  explanation: ''
- id: mcq_anat_ch2_018
  question: Which specific nerve is historically at the highest risk of laceration
    or traction during a fracture of the surgical neck of the humerus?
  options:
  - Radial nerve
  - Musculocutaneous nerve
  - Ulnar nerve
  - Axillary nerve
  answer: Axillary nerve
  explanation: ''
- id: mcq_anat_ch2_019
  question: 'The anatomical snuff box is bounded on its lateral (radial) aspect by
    the paired tendons of the:'
  options:
  - Extensor pollicis longus
  - Abductor pollicis longus and Extensor pollicis brevis
  - Extensor carpi radialis longus
  - Flexor pollicis longus
  answer: Abductor pollicis longus and Extensor pollicis brevis
  explanation: ''
- id: mcq_anat_ch2_020
  question: Which vital structures pass directly beneath the flexor retinaculum, traversing
    the carpal tunnel?
  options:
  - Ulnar nerve and artery
  - Radial nerve and artery
  - Median nerve and flexor tendons
  - Superficial palmar arch
  answer: Median nerve and flexor tendons
  explanation: ''
- id: mcq_anat_ch2_021
  question: Which muscle acts as the strongest and primary supinator of the forearm
    when the elbow is already flexed?
  options:
  - Supinator
  - Brachioradialis
  - Biceps brachii
  - Pronator teres
  answer: Biceps brachii
  explanation: ''
- id: mcq_anat_ch2_022
  question: Which strut-like bone is exclusively responsible for transmitting the
    mechanical weight of the entire upper limb to the axial skeleton?
  options:
  - Humerus
  - Scapula
  - Sternum
  - Clavicle
  answer: Clavicle
  explanation: ''
- id: mcq_anat_ch2_023
  question: 'The floor of the intertubercular (bicipital) groove of the humerus contains
    the specific insertion site of the:'
  options:
  - Pectoralis major
  - Teres major
  - Latissimus dorsi
  - Coracobrachialis
  answer: Latissimus dorsi
  explanation: ''
- id: mcq_anat_ch2_024
  question: Which of the following dynamically stabilizing muscles is NOT anatomically
    categorized as part of the rotator cuff?
  options:
  - Supraspinatus
  - Infraspinatus
  - Teres major
  - Subscapularis
  answer: Teres major
  explanation: ''
- id: mcq_anat_ch2_025
  question: 'Volkmann''s ischemic contracture is classically recognized as a dreaded
    anoxic complication following poor management of a:'
  options:
  - Clavicle fracture
  - Supracondylar fracture of humerus
  - Colles' fracture
  - Scaphoid fracture
  answer: Supracondylar fracture of humerus
  explanation: ''
- id: mcq_anat_ch2_026
  question: 'The standard spinal root value origins forming the musculocutaneous nerve
    are:'
  options:
  - C5, C6
  - C5, C6, C7
  - C8, T1
  - C7, C8, T1
  answer: C5, C6, C7
  explanation: ''
- id: mcq_anat_ch2_027
  question: Which distinct superficial anatomical structure explicitly pierces the
    clavipectoral fascia in the deltopectoral triangle?
  options:
  - Basilic vein
  - Musculocutaneous nerve
  - Cephalic vein
  - Axillary artery
  answer: Cephalic vein
  explanation: ''
- id: mcq_anat_ch2_028
  question: Which group of axillary lymph nodes is the primary receiver of the lymphatic
    drainage from the lateral quadrants of the breast?
  options:
  - Lateral group
  - Anterior (pectoral) group
  - Posterior (subscapular) group
  - Apical group
  answer: Anterior (pectoral) group
  explanation: ''
- id: mcq_anat_ch2_029
  question: 'A patient presenting with a ''step-deformity'' of the shoulder and a
    positive ''piano key sign'' has most likely suffered an injury to the:'
  options:
  - Glenohumeral joint
  - Acromioclavicular joint
  - Sternoclavicular joint
  - Coracoclavicular joint alone
  answer: Acromioclavicular joint
  explanation: ''
- id: mcq_anat_ch2_030
  question: 'The sensory area of the skin overlying the lower half of the deltoid
    muscle (known as the regimental badge area) is supplied by the:'
  options:
  - Suprascapular nerve
  - Axillary nerve
  - Radial nerve
  - Musculocutaneous nerve
  answer: Axillary nerve
  explanation: ''
viva:
- id: viva_anat_ch2_001
  question: Define the precise boundaries, roof, and floor of the anatomical snuffbox.
  answer: It is bounded anteriorly by tendons of abductor pollicis longus and extensor
    pollicis brevis, and posteriorly by extensor pollicis longus. The floor is formed
    by the scaphoid and trapezium bones.
  keyPoints: Anterior vs posterior bounds, floor bones.
  clinicalImportance: Tenderness in the snuffbox specifically indicates a scaphoid
    fracture.
- id: viva_anat_ch2_002
  question: What is a FOOSH injury, and what are the two most common fractures associated
    with it in different age groups?
  answer: Fall on Outstretched Hand. It most commonly causes a Colles' fracture of
    the distal radius in older adults, and a scaphoid fracture in young adults.
  keyPoints: Colles fracture (older), scaphoid fracture (young).
  clinicalImportance: Understanding FOOSH mechanisms helps predict specific wrist
    fractures.
- id: viva_anat_ch2_003
  question: Explain the characteristic functional deformities caused by Erb's palsy
    versus Klumpke's paralysis.
  answer: Erb's palsy (upper trunk C5-C6) causes 'waiter's tip' hand (arm adducted,
    medially rotated, forearm extended). Klumpke's paralysis (lower trunk C8-T1) causes
    'claw hand' deformity due to intrinsic muscle paralysis.
  keyPoints: Waiter's tip vs Claw hand, upper vs lower roots.
  clinicalImportance: Critical for neonatal brachial plexus injury differentiation.
- id: viva_anat_ch2_004
  question: Name the critical neurovascular structures immediately at risk in a fracture
    of the mid-shaft of the humerus.
  answer: The radial nerve and the profunda brachii artery, which run together in
    the spiral groove.
  keyPoints: Radial nerve, profunda brachii artery.
  clinicalImportance: Injury causes wrist drop and triceps weakness.
- id: viva_anat_ch2_005
  question: Describe the functional difference between the axis of movement (median
    line) of the hand compared to the lower limb.
  answer: In the hand, the functional axis passes through the 3rd digit (middle finger).
    In the foot, the axis passes through the 2nd digit.
  keyPoints: Hand axis = 3rd digit, foot = 2nd.
  clinicalImportance: Determines abduction/adduction of digits.
- id: viva_anat_ch2_006
  question: Name the primary superficial veins of the upper limb and detail their
    clinical significance for intravenous access.
  answer: Cephalic, basilic, and median cubital veins. The median cubital vein is
    primarily used for venipuncture.
  keyPoints: Median cubital vein sits over bicipital aponeurosis.
  clinicalImportance: Safest access site protecting deep arteries and nerves.
- id: viva_anat_ch2_007
  question: What primarily constitutes the shoulder girdle, and what is its single
    bony point of attachment to the axial skeleton?
  answer: The clavicle and scapula. Its only bony attachment to the axial skeleton
    is the sternoclavicular joint.
  keyPoints: Clavicle, scapula, SC joint.
  clinicalImportance: Extreme mobility at the cost of stability.
- id: viva_anat_ch2_008
  question: What is the clinical significance of the clavipectoral fascia, and what
    major structures pierce it?
  answer: It is a strong fascial sheet deep to the pectoralis major. It is pierced
    by the cephalic vein, thoracoacromial artery, lateral pectoral nerve, and lymphatic
    vessels.
  keyPoints: Key sheet deep to pectoralis major, pierced structures (C-T-L-L).
  clinicalImportance: Protects the axilla and serves as an important surgical landmark.
- id: viva_anat_ch2_009
  question: Explain the clinical presentation and anatomical basis of 'winged scapula'.
  answer: Winged scapula is caused by injury to the long thoracic nerve (C5-C7), which
    paralyzes the serratus anterior muscle. The medial border of the scapula protrudes
    backwards, especially when pushing against resistance.
  keyPoints: Long thoracic nerve, serratus anterior, medial border protrusion.
  clinicalImportance: Restricts overhead reach above 90 degrees and compromises shoulder
    girdle stability.
- id: viva_anat_ch2_010
  question: What is Volkmann's Ischemic Contracture, and how does it typically occur?
  answer: It is a permanent flexion deformity of the wrist and fingers caused by ischemia
    and contracture of the forearm flexor muscles, usually following supracondylar
    fractures of the humerus in children.
  keyPoints: Flexor muscle ischemia, contracture, supracondylar humerus fracture complication.
  clinicalImportance: Is a surgical emergency due to compartment syndrome.
