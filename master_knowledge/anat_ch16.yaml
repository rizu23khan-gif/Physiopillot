theory:
  definitions:
  - 'Chapter Overview: This chapter reviews the bony elements making up the thorax
    and their articulations, highlighting rib classification and thoracic spine mobility.'
  - 'Bones of Thorax: Comprise the 12 thoracic vertebrae, the 12 pairs of ribs, and
    the sternum.'
  - 'Rib Classification: Classified as True ribs (1st to 7th, attach directly to the
    sternum), False ribs (8th to 10th, attach to the cartilage above), and Floating
    ribs (11th and 12th, end in the abdominal musculature).'
  coreConcepts:
  - 'Thoracic Vertebrae: Characterized by costal facets on the bodies and transverse
    processes for articulation with heads and tubercles of ribs.'
  - 'Rib Anatomy: Each typical rib has a head (articulating with adjacent vertebrae),
    a neck, a tubercle (articulating with the transverse process), and a shaft with
    a costal groove on its internal inferior border.'
  - 'Joints of Thorax: Includes costovertebral joints (synovial, slide/rotate during
    breathing), costochondral joints (cartilaginous, no movement), and sternocostal
    joints.'
  equipment:
  - Disarticulated ribs model
  - Goniometer for back extension checks
  - Thoracic spine model with cartilage
clinicalCorrelations:
  pearls:
  - 'Costochondritis: Inflammation of the costal cartilage causing localized anterior
    chest wall pain, often mimicking angina/cardiac conditions.'
  - 'Rib Fractures: Most commonly occur at the angle of the rib, which is its weakest
    point.'
